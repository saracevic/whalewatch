<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>BTC Whale Watch</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07090f;--card:#0d1017;--border:rgba(255,255,255,.07);
  --txt:#c8cedd;--muted:#4a5068;--dim:#2a2f40;
  --orange:#f7931a;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;font-size:14px;min-height:100vh;overscroll-behavior:none}

/* ── TOP BAR ── */
.bar{position:sticky;top:0;z-index:50;background:rgba(7,9,15,.98);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);padding-top:env(safe-area-inset-top,0)}
.bar-main{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:50px}
.logo{font-weight:800;font-size:16px;display:flex;align-items:center;gap:6px;letter-spacing:-.3px}
.logo em{color:var(--orange);font-style:normal}
.bar-r{display:flex;align-items:center;gap:6px}
.price-pill{font-family:'SF Mono',monospace;font-weight:700;color:var(--orange);font-size:13px;
  background:rgba(247,147,26,.1);border:1px solid rgba(247,147,26,.25);padding:5px 10px;border-radius:20px}
.bar-status{display:flex;align-items:center;gap:5px;padding:4px 14px 6px;overflow-x:auto;scrollbar-width:none}
.bar-status::-webkit-scrollbar{display:none}

/* chips */
.chip{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;
  padding:3px 8px;border-radius:20px;border:1px solid;white-space:nowrap;flex-shrink:0;font-family:monospace}
.chip-ws-on {background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.35);color:#c4b5fd}
.chip-ws-off{background:rgba(100,100,100,.08);border-color:rgba(100,100,100,.2);color:var(--muted)}
.chip-ok   {background:rgba(34,197,94,.08); border-color:rgba(34,197,94,.3); color:#4ade80}
.chip-slow {background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.3);color:#fcd34d}
.chip-idle {background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);color:var(--muted)}
.chip-err  {background:rgba(239,68,68,.08); border-color:rgba(239,68,68,.3); color:#f87171}
.chip-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.dot-ws {background:#a78bfa;box-shadow:0 0 5px #a78bfa80;animation:pulse 1.8s infinite}
.dot-off{background:var(--dim)}
.dot-ok {background:#22c55e;box-shadow:0 0 4px #22c55e80}
.dot-slow{background:#f59e0b}
.dot-idle{background:var(--muted)}
.dot-err{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.sound-btn,.notif-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;
  border-radius:50%;border:1px solid rgba(255,255,255,.12);background:none;cursor:pointer;font-size:15px;color:var(--txt)}
.sound-btn.on{border-color:rgba(247,147,26,.4);background:rgba(247,147,26,.08);color:var(--orange)}
.sound-btn.off{opacity:.4}
.notif-btn.on{border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.08);color:#a78bfa}

/* ── PAGE ── */
.page{max-width:480px;margin:0 auto;padding:10px 10px calc(24px + var(--safe-bottom))}
#banner{display:none;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid}
#banner.buy {background:rgba(34,197,94,.07); border-color:rgba(34,197,94,.3)}
#banner.sell{background:rgba(239,68,68,.07); border-color:rgba(239,68,68,.3)}
#banner.move{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.25)}
.bn-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.bn-badge{font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px}
.bb-buy {background:rgba(34,197,94,.18); color:#4ade80;border:1px solid rgba(34,197,94,.4)}
.bb-sell{background:rgba(239,68,68,.18); color:#f87171;border:1px solid rgba(239,68,68,.4)}
.bb-move{background:rgba(245,158,11,.14);color:#fcd34d;border:1px solid rgba(245,158,11,.35)}
.bn-time{font-size:10px;color:var(--muted)}
.bn-entity{font-size:15px;font-weight:800;margin-bottom:2px}
.bn-amount{font-family:'SF Mono',monospace;font-size:22px;font-weight:800;margin-bottom:5px;letter-spacing:-.5px}
.bn-summary{font-size:12px;color:#8892aa;line-height:1.6;margin-bottom:8px}
.bn-link{font-size:10px;color:var(--muted);font-family:monospace;text-decoration:none}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px}
.stat-l{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:5px}
.stat-v{font-size:20px;font-weight:800;font-family:'SF Mono',monospace;letter-spacing:-.5px}
.stat-sub{font-size:10px;color:var(--muted);margin-top:2px}
.co{color:var(--orange)}.cg{color:var(--green)}.cr{color:var(--red)}
.stats-bar{display:flex;gap:5px;margin-bottom:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.stats-bar::-webkit-scrollbar{display:none}
.cat-pill{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;
  border:1px solid var(--border);background:var(--card);color:var(--muted)}
.cat-pill span{font-family:'SF Mono',monospace;color:var(--txt)}
.progress-bar{height:2px;background:rgba(255,255,255,.05);margin-bottom:10px;border-radius:1px;overflow:hidden}
.progress-fill{height:2px;background:linear-gradient(90deg,var(--orange),#ffb347);border-radius:1px;transition:width .3s;width:0%}
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.sec-h{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.05)}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted)}
.sec-act{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;font-weight:600}
.qbox{padding:12px}
.qrow{margin-bottom:8px}
.qrow input{width:100%;background:var(--bg);border:1px solid rgba(255,255,255,.1);color:var(--txt);
  padding:11px 12px;border-radius:10px;font-family:'SF Mono',monospace;font-size:16px;outline:none;-webkit-appearance:none}
.qrow input:focus{border-color:var(--orange)}
.qrow input::placeholder{color:var(--dim);font-size:13px}
.qrow2{display:flex;gap:8px}
.qrow2 input{flex:1;background:var(--bg);border:1px solid rgba(255,255,255,.1);color:var(--txt);
  padding:11px 12px;border-radius:10px;font-size:16px;outline:none;min-width:0;-webkit-appearance:none}
.qrow2 input:focus{border-color:var(--orange)}
.qrow2 input::placeholder{color:var(--dim);font-size:13px}
.qbtn{padding:11px 16px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.qbtn-p{background:var(--orange);color:#000}
.qbtn-s{background:none;border:1px solid rgba(255,255,255,.12);color:var(--txt)}
#qr{display:none;border-top:1px solid var(--border);padding:14px}
.qr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:12px}
.qr-name{font-size:15px;font-weight:800}
.qr-type{font-size:10px;color:var(--muted);margin-top:2px;font-weight:600}
.qr-addr{font-family:monospace;font-size:9px;color:var(--muted);margin-top:3px}
.qr-addr a{color:var(--muted);text-decoration:none}
.qr-bal{text-align:right;flex-shrink:0}
.qr-btc{font-family:'SF Mono',monospace;font-size:22px;font-weight:800;color:var(--orange)}
.qr-usd{font-size:11px;color:var(--muted);margin-top:1px}
.summary-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px}
.summary-title{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;font-weight:700}
.summary-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.summary-row:last-child{border-bottom:none;padding-bottom:0}
.summary-label{font-size:11px;color:#8892aa}
.summary-vals{text-align:right}
.summary-btc{font-family:'SF Mono',monospace;font-size:12px;font-weight:700;color:var(--orange)}
.summary-usd{font-size:10px;color:var(--muted);margin-top:1px}
.qr-tx-title{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:8px;padding-top:12px;border-top:1px solid var(--border);font-weight:700}
.tx-item{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.tx-item:last-child{border-bottom:none}
.tx-dir{font-size:9px;font-weight:800;padding:3px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.d-in{background:rgba(34,197,94,.13);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.d-out{background:rgba(239,68,68,.13);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.tx-body{flex:1;min-width:0}
.tx-sum{font-size:11px;color:#8892aa;line-height:1.5}
.tx-meta{font-size:9px;color:var(--dim);margin-top:2px}
.tx-meta a{color:var(--dim);text-decoration:none;font-family:monospace}
.tx-amt{font-family:'SF Mono',monospace;font-size:12px;font-weight:700;text-align:right;white-space:nowrap;flex-shrink:0}
.qr-actions{display:flex;gap:8px;margin-top:12px}
.score-box{display:flex;align-items:center;gap:8px;margin:10px 0;padding:10px 12px;border-radius:10px;background:var(--bg);border:1px solid var(--border)}
.score-num{font-family:'SF Mono',monospace;font-size:24px;font-weight:800}
.score-label{font-size:9px;font-weight:800;padding:2px 9px;border-radius:20px}
.sl-low  {background:rgba(34,197,94,.15); color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.sl-med  {background:rgba(245,158,11,.15);color:#fcd34d;border:1px solid rgba(245,158,11,.3)}
.sl-high {background:rgba(239,68,68,.15); color:#f87171;border:1px solid rgba(239,68,68,.3)}
.sl-vhigh{background:rgba(239,68,68,.3);  color:#fca5a5;border:1px solid rgba(239,68,68,.5)}
.log-item{display:flex;gap:8px;align-items:flex-start;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s}
.log-item:hover{background:rgba(255,255,255,.02)}
.log-item:last-child{border-bottom:none}
.log-badge{font-size:9px;font-weight:800;padding:3px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.lb-buy {background:rgba(34,197,94,.14); color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.lb-sell{background:rgba(239,68,68,.14); color:#f87171;border:1px solid rgba(239,68,68,.3)}
.lb-move{background:rgba(245,158,11,.12);color:#fcd34d;border:1px solid rgba(245,158,11,.3)}
.log-mid{flex:1;min-width:0}
.log-name{font-size:12px;font-weight:700;margin-bottom:3px}
.log-sum{font-size:11px;color:#8892aa;line-height:1.55}
.log-meta{font-size:9px;color:var(--dim);margin-top:4px}
.log-meta a{color:var(--dim);text-decoration:none;font-family:monospace}
.log-right{text-align:right;flex-shrink:0}
.log-btc{font-family:'SF Mono',monospace;font-size:13px;font-weight:700}
.log-usd{font-size:9px;color:var(--muted);margin-top:2px}
.empty{text-align:center;padding:28px 16px;color:var(--dim);font-size:11px;line-height:1.8}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.08);border-top-color:var(--orange);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
#toasts{position:fixed;bottom:calc(16px + var(--safe-bottom));left:50%;transform:translateX(-50%);z-index:999;
  display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none;width:90%;max-width:380px}
.toast{background:#161923;border:1px solid rgba(255,255,255,.1);border-radius:10px;
  padding:10px 16px;font-size:12px;animation:tin .25s ease;line-height:1.5;text-align:center;width:100%;font-weight:500}
.toast.buy {border-color:rgba(34,197,94,.5);color:#4ade80;font-weight:700}
.toast.sell{border-color:rgba(239,68,68,.6);color:#f87171;font-weight:700;background:#1a0d0d}
.toast.warn{border-color:rgba(245,158,11,.5);color:#fcd34d;font-weight:700}
.toast.ok  {border-color:rgba(34,197,94,.25)}
.toast.err {border-color:rgba(239,68,68,.3);color:#f87171}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.alert-banner{display:none;position:fixed;top:80px;left:0;right:0;z-index:40;
  padding:10px 16px;text-align:center;font-size:13px;font-weight:700;animation:flashin .3s ease}
.alert-banner.sell{background:rgba(239,68,68,.95);color:#fff}
.alert-banner.buy {background:rgba(34,197,94,.9); color:#000}
@keyframes flashin{0%{opacity:0;transform:translateY(-6px)}100%{opacity:1;transform:none}}
</style>
</head>

function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playAlert(type){
  if(!soundEnabled)return;
  try{
    const ctx=getAudioCtx();if(ctx.state==='suspended')ctx.resume();
    if(type==='sell'){
      [0,.25,.5].forEach(d=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
        o.type='square';o.frequency.setValueAtTime(880,ctx.currentTime+d);o.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+d+.15);
        g.gain.setValueAtTime(.35,ctx.currentTime+d);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+.15);
        o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+.15);});
    }else if(type==='buy'){
      [[523,0],[659,.18],[784,.36]].forEach(([f,d])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
        o.type='sine';o.frequency.setValueAtTime(f,ctx.currentTime+d);g.gain.setValueAtTime(.3,ctx.currentTime+d);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+.2);o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+.2);});
    }else{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
      o.frequency.value=600;g.gain.setValueAtTime(.2,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.2);
      o.start(ctx.currentTime);o.stop(ctx.currentTime+.2);}
  }catch(e){}
}

// ═══════════════════════════════════════════
//  STATUS BAR — üst şerit
// ═══════════════════════════════════════════
function renderStatusBar(){
  const bar=document.getElementById('bar-status');if(!bar)return;
  const parts=[];

  // WebSocket toplamı
  const wsOn=wsStats.filter(w=>w.connected).length;
  const wsTotalAddr=wsStats.reduce((s,w)=>s+(w.connected?w.trackCount:0),0);
  const wsRx=wsStats.reduce((s,w)=>s+w.rxCount,0);
  if(wsOn>0){
    parts.push(`<div class="chip chip-ws-on"><div class="chip-dot dot-ws"></div>WS ${wsOn}/${WS_COUNT} · ${wsTotalAddr} adres · ${wsRx} msg</div>`);
  }else{
    parts.push(`<div class="chip chip-ws-off"><div class="chip-dot dot-off"></div>WS bağlanıyor…</div>`);
  }

  // REST API'ler
  for(const api of APIS){
    const age=api.lastOkTime?Math.round((Date.now()-api.lastOkTime)/1000):null;
    let cls,dotCls,label;
    if(api.reqCount===0 && api.errors===0){cls='chip-idle';dotCls='dot-idle';label=api.name+' başlıyor…';}
    else if(!api.ok||api.errors>=5){cls='chip-err';dotCls='dot-err';label=api.name+' hata!';}
    else if(api.lastMs>2500){cls='chip-slow';dotCls='dot-slow';label=api.name+' '+api.lastMs+'ms';}
    else{cls='chip-ok';dotCls='dot-ok';label=api.name+(age!==null?' '+age+'s':'');}
    parts.push(`<div class="chip ${cls}"><div class="chip-dot ${dotCls}"></div>${label} ·${api.reqCount}</div>`);
  }
  if(USE_PROXY){
    parts.push(`<div class="chip chip-slow"><div class="chip-dot dot-slow"></div>🔁 proxy ${activeProxyIdx>=0?'#'+(activeProxyIdx+1):'deneniyor'}</div>`);
  }
  bar.innerHTML=parts.join('');
}

// ═══════════════════════════════════════════
//  WEBSOCKET — 3 paralel bağlantı
//  Her biri 45 adres → 135 adres tam kapsam
// ═══════════════════════════════════════════
function buildWsConnections(){
  for(let i=0;i<WS_COUNT;i++){
    const chunk=ALL_ADDRS.slice(i*WS_BATCH,(i+1)*WS_BATCH);
    if(chunk.length)createWsConn(chunk,i);
  }
}
function createWsConn(chunk,idx){
  try{
    const ws=new WebSocket('wss://ws.mempool.space/api/v1/ws');
    wsConns[idx]=ws;
    ws.onopen=()=>{
      wsStats[idx].connected=true;
      wsStats[idx].trackCount=chunk.length;
      ws.send(JSON.stringify({'track-addresses':chunk}));
      renderStatusBar();
    };
    ws.onmessage=async(ev)=>{
      try{
        const data=JSON.parse(ev.data);
        wsStats[idx].rxCount++;
        if(data['multi-address-transactions']){
          for(const [addr,txData] of Object.entries(data['multi-address-transactions'])){
            const known=KNOWN_MAP[addr.toLowerCase()];if(!known)continue;
            const txs=txData.mempool||txData.confirmed||[];
            for(const tx of txs){
              if(lastTxHashes[addr]===tx.txid)continue;
              lastTxHashes[addr]=tx.txid;
              await analyzeTx(addr,known,tx,'⚡ws');
            }
          }
        }
        renderStatusBar();
      }catch(e){}
    };
    ws.onclose=()=>{wsStats[idx].connected=false;renderStatusBar();setTimeout(()=>createWsConn(chunk,idx),12000);};
    ws.onerror=()=>{wsStats[idx].connected=false;ws.close();};
  }catch(e){wsStats[idx].connected=false;}
}

// ═══════════════════════════════════════════
//  TEK API REST POLL — blockstream.info
//  Tüm 130+ adresi tek API ile, yavaş ama
//  hatasız şekilde tarar.
// ═══════════════════════════════════════════
// CORS proxy fallback zinciri: bazı mobil tarayıcı/origin kombinasyonlarında
// blockstream.info CORS header'ı dönmeyebiliyor. Doğrudan istek başarısız
// olursa sırayla farklı proxy servisleri denenir; çalışan bulunduğunda
// o proxy "yapışkan" hale gelir (her seferinde baştan denenmez).
const PROXIES=[
  u=>'https://corsproxy.io/?url='+encodeURIComponent(u),
  u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
  u=>'https://thingproxy.freeboard.io/fetch/'+u,
];
let activeProxyIdx=-1; // -1 = doğrudan istek modu, 0+ = PROXIES içindeki sabitlenmiş proxy
let USE_PROXY=false; // status bar göstergesi için

async function fetchSafe(url,timeoutMs=9000){
  // 1) Doğrudan istek (henüz bir proxy'ye sabitlenmediysek dene)
  if(activeProxyIdx===-1){
    try{
      const r=await fetch(url,{signal:AbortSignal.timeout(timeoutMs)});
      if(!r.ok)throw new Error('HTTP '+r.status);
      return await r.json();
    }catch(e){ /* doğrudan başarısız → proxy denemesine geç */ }
  }
  // 2) Zaten sabitlenmiş bir proxy varsa direkt onu kullan
  if(activeProxyIdx>=0){
    const r=await fetch(PROXIES[activeProxyIdx](url),{signal:AbortSignal.timeout(timeoutMs+4000)});
    if(!r.ok)throw new Error('Proxy HTTP '+r.status);
    USE_PROXY=true;
    return r.json();
  }
  // 3) Henüz sabitlenmemiş proxy: hepsini sırayla dene, ilk çalışanı sabitle
  let lastErr;
  for(let i=0;i<PROXIES.length;i++){
    try{
      const r=await fetch(PROXIES[i](url),{signal:AbortSignal.timeout(timeoutMs+4000)});
      if(!r.ok)throw new Error('Proxy HTTP '+r.status);
      const data=await r.json();
      activeProxyIdx=i;USE_PROXY=true;
      return data;
    }catch(e){lastErr=e;}
  }
  throw lastErr||new Error('Tüm proxyler başarısız');
}
async function pollOneAddr(api,addr){
  const known=KNOWN_MAP[addr.toLowerCase()];if(!known)return;
  const t0=Date.now();
  try{
    const raw=await fetchSafe(api.addrUrl(addr));
    const parsed=api.parseAddr(raw);if(!parsed)return;
    api.lastMs=Date.now()-t0;api.lastOkTime=Date.now();api.ok=true;
    api.errors=Math.max(0,api.errors-1);api.reqCount++;

    let txs=[];
    if(api.txUrl){
      const txRaw=await fetchSafe(api.txUrl(addr));
      txs=api.parseTxs(txRaw);
    }else{
      txs=api.parseTxs(raw);
    }
    if(!txs.length)return;

    const latest=txs[0].txid;
    const prev=lastTxHashes[addr];
    if(!prev){lastTxHashes[addr]=latest;return;}
    if(prev!==latest){
      lastTxHashes[addr]=latest;
      // Tam TX detayını blockstream'den çek (mempool yerine — sertifika hatası riski)
      let fullTx=txs[0];
      try{fullTx=await fetchSafe(`https://blockstream.info/api/tx/${latest}`,6000);}catch{}
      await analyzeTx(addr,known,fullTx,api.id);
    }
  }catch(e){
    api.errors++;
    if(api.errors>=5)api.ok=false;
  }
}

async function runApiWorker(api,group){
  // Baseline: ilk geçişte hash topla, sinyal çıkartma
  for(const addr of group){
    try{
      const raw=await fetchSafe(api.addrUrl(addr));
      const parsed=api.parseAddr(raw);if(!parsed){await sleep(api.rateMs);continue;}
      api.lastMs=0;api.lastOkTime=Date.now();api.ok=true;api.reqCount++;
      let txs=[];
      if(api.txUrl){try{const r2=await fetchSafe(api.txUrl(addr));txs=api.parseTxs(r2);}catch{}}
      else txs=api.parseTxs(raw);
      if(txs.length&&!lastTxHashes[addr])lastTxHashes[addr]=txs[0].txid;
    }catch(e){api.errors++;if(api.errors>=5)api.ok=false;}
    await sleep(api.rateMs);
    renderStatusBar();
  }
  document.getElementById('s-sub').textContent=`baseline tamam · ${api.name}`;

  // Sonsuz döngü
  while(true){
    const t0=Date.now();
    let done=0;
    for(const addr of group){
      await sleep(api.rateMs);
      await pollOneAddr(api,addr);
      done++;
      document.getElementById('progress-fill').style.width=Math.round(done/group.length*100)+'%';
      if(done%5===0)renderStatusBar();
    }
    document.getElementById('progress-fill').style.width='0%';
    document.getElementById('s-sub').textContent=`döngü ${Math.round((Date.now()-t0)/1000)}s · ${api.name}`;
    await sleep(Math.max(0,5000-(Date.now()-t0)));
  }
}

function startRestPolling(){
  // Tek API var → tüm adresler tek worker'a gidiyor
  APIS.forEach(api=>{runApiWorker(api,ALL_ADDRS);});
}

// ═══════════════════════════════════════════
//  TX ANALİZİ
// ═══════════════════════════════════════════
async function analyzeTx(watchAddr,known,tx,source){
  let recv=0,spent=0;
  const cAddrs=[];
  (tx.vin||[]).forEach(v=>{
    if(v.prevout?.scriptpubkey_address===watchAddr)spent+=v.prevout.value;
    else if(v.prevout?.scriptpubkey_address)cAddrs.push(v.prevout.scriptpubkey_address);
  });
  (tx.vout||[]).forEach(v=>{
    if(v.scriptpubkey_address===watchAddr)recv+=v.value;
    else if(v.scriptpubkey_address)cAddrs.push(v.scriptpubkey_address);
  });
  const netBtc=(recv-spent)/1e8;
  if(Math.abs(netBtc)<0.5)return;

  const cEx=cAddrs.some(a=>EXCHANGES.has(a.toLowerCase()));
  const cEnt=cAddrs.map(a=>KNOWN_MAP[a.toLowerCase()]).find(Boolean);
  const btcAbs=Math.abs(netBtc),usd=btcAbs*btcPrice;
  let signalType,badge,summary;

  if(netBtc>0){
    if(cEx){signalType='buy';badge='🟢 BİRİKİM';summary=`${known.name}, borsadan ${btcAbs.toFixed(4)} BTC çekti → soğuk cüzdan birikim sinyali.`;}
    else if(cEnt){signalType='move';badge='🟡 TRANSFER';summary=`${known.name}, ${cEnt.name}'dan ${btcAbs.toFixed(4)} BTC aldı.`;}
    else{signalType='buy';badge='🟢 GİRİŞ';summary=`${known.name} cüzdanına ${btcAbs.toFixed(4)} BTC girdi.`;}
  }else{
    if(cEx){signalType='sell';badge='🔴 SATIŞ';summary=`${known.name}, borsaya ${btcAbs.toFixed(4)} BTC gönderdi! Satış hazırlığı uyarısı.`;}
    else if(cEnt){signalType='move';badge='🟡 TRANSFER';summary=`${known.name}, ${cEnt.name}'a ${btcAbs.toFixed(4)} BTC gönderdi.`;}
    else{signalType='move';badge='🟡 ÇIKIŞ';summary=`${known.name} cüzdanından ${btcAbs.toFixed(4)} BTC çıktı.`;}
  }

  const entry={t:Date.now(),entity:known.name,type:known.type,btc:netBtc,usd,badge,signalType,summary,txHash:tx.txid,source};
  signalLog.unshift(entry);if(signalLog.length>60)signalLog.pop();
  if(signalType==='sell'){sSell++;document.getElementById('s-sell').textContent=sSell;}
  else if(signalType==='buy'){sBuy++;document.getElementById('s-buy').textContent=sBuy;}

  playAlert(signalType);
  if(signalType==='sell'){showAlertBanner('🚨 SATIŞ: '+known.name+' — '+btcAbs.toFixed(4)+' BTC borsaya gönderildi!','sell');showDesktopNotif('🔴 Balina Satışı!',known.name+' → '+btcAbs.toFixed(4)+' BTC borsaya','sell');}
  else if(signalType==='buy'){showAlertBanner('💚 BİRİKİM: '+known.name+' — '+btcAbs.toFixed(4)+' BTC çekildi','buy');showDesktopNotif('🟢 Balina Birikimi',known.name+' → '+btcAbs.toFixed(4)+' BTC çekildi','buy');}
  showBanner(entry);renderLog();
  toast(badge+'\n'+known.name+' — '+btcAbs.toFixed(4)+' BTC',signalType==='sell'?'sell':'buy');
}

function showBanner(e){
  const b=document.getElementById('banner');b.className=e.signalType;b.style.display='block';
  const bdg=document.getElementById('bn-badge');bdg.textContent=e.badge;bdg.className='bn-badge bb-'+e.signalType;
  document.getElementById('bn-time').textContent=timeAgo(e.t);
  const ent=document.getElementById('bn-entity');ent.textContent=e.entity+' · '+e.type;
  ent.style.color=e.signalType==='sell'?'#f87171':e.signalType==='buy'?'#4ade80':'#fcd34d';
  const amt=document.getElementById('bn-amount');
  amt.textContent=(e.btc>0?'+':'')+e.btc.toFixed(4)+' BTC'+(e.usd?' ≈ $'+fmtUSD(e.usd):'');
  amt.style.color=e.signalType==='sell'?'#f87171':e.signalType==='buy'?'#4ade80':'#fcd34d';
  document.getElementById('bn-summary').textContent=e.summary;
  const lnk=document.getElementById('bn-link');
  if(e.txHash?.length>10){lnk.href='https://mempool.space/tx/'+e.txHash;lnk.textContent='TX: '+e.txHash.slice(0,16)+'… ↗';}
  else{lnk.href='#';lnk.textContent='';}
}

function renderLog(){
  const el=document.getElementById('log-body');
  if(!signalLog.length){el.innerHTML='<div class="empty">İzleniyor…<br>Balina hareketi bekleniyor 🐋</div>';return;}
  el.innerHTML=signalLog.map(e=>`
    <div class="log-item" onclick="${e.txHash?.length>10?`window.open('https://mempool.space/tx/${e.txHash}','_blank')`:''}">
      <div class="log-badge lb-${e.signalType}">${e.badge}</div>
      <div class="log-mid">
        <div class="log-name">${esc(e.entity)} <span style="font-size:9px;color:var(--muted);font-weight:400">${e.type}</span>
          <span style="font-size:8px;color:${e.source==='⚡ws'?'#a78bfa':'var(--dim)'};font-family:monospace;margin-left:3px">${esc(e.source||'')}</span>
        </div>
        <div class="log-sum">${esc(e.summary)}</div>
        <div class="log-meta">${timeAgo(e.t)}${e.txHash?.length>10?' · <a href="https://mempool.space/tx/'+e.txHash+'" target="_blank">'+e.txHash.slice(0,10)+'…↗</a>':''}</div>
      </div>
      <div class="log-right">
        <div class="log-btc" style="color:${e.signalType==='sell'?'#f87171':e.signalType==='buy'?'#4ade80':'#fcd34d'}">${(e.btc>0?'+':'')+e.btc.toFixed(4)}</div>
        <div style="font-size:8px;color:var(--orange);font-weight:700;margin-top:1px">BTC</div>
        ${e.usd?`<div class="log-usd">$${fmtUSD(e.usd)}</div>`:''}
      </div>
    </div>`).join('');
}

function clearLog(){signalLog=[];sBuy=0;sSell=0;
  document.getElementById('s-buy').textContent='0';document.getElementById('s-sell').textContent='0';
  document.getElementById('banner').style.display='none';renderLog();}

function renderStatsBar(){
  document.getElementById('stats-bar').innerHTML=Object.entries(CAT_META).map(([cat,m])=>
    `<div class="cat-pill">${m.emoji} ${m.label} <span>${RAW[cat].length}</span></div>`).join('');
}

// ── ADRES SORGULA (manuel sorgu hâlâ blockstream kullanıyor — hızlı ve kararlı)
function addrType(a){return a.startsWith('bc1p')?'Taproot':a.startsWith('bc1q')&&a.length>50?'SegWit Long':a.startsWith('bc1q')?'SegWit':a.startsWith('3')?'P2SH':a.startsWith('1')?'Legacy':'?';}
function scoreLabel(s){if(s<35)return{text:'LOW',cls:'sl-low',color:'#4ade80'};if(s<55)return{text:'MED',cls:'sl-med',color:'#fcd34d'};if(s<75)return{text:'HIGH',cls:'sl-high',color:'#f87171'};return{text:'V.HIGH',cls:'sl-vhigh',color:'#fca5a5'};}
function computeScore(addr,known){let s=20;if(addr.startsWith('bc1p'))s+=10;else if(addr.startsWith('bc1q')&&addr.length>50)s+=8;else if(addr.startsWith('bc1q'))s+=5;else if(addr.startsWith('3'))s+=15;else if(addr.startsWith('1'))s+=20;if(known){const t=known.cat;if(t==='exchange')s+=30;else if(t==='etf')s+=25;else if(t==='gov')s+=35;else if(t==='legendary')s+=40;else if(t==='miner')s+=20;else s+=15;}else s+=Math.abs(hashStr(addr))%25;return Math.min(s,99);}
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h);}

async function queryAddr(){
  const addr=document.getElementById('q-addr').value.trim();
  const label=document.getElementById('q-name').value.trim();
  if(!addr){toast('Adres boş','err');return;}
  if(!isValidBTC(addr)){toast('Geçersiz BTC adresi','err');return;}
  const res=document.getElementById('qr');res.style.display='block';
  res.innerHTML='<div style="padding:20px;text-align:center"><div class="spin"></div><br><span style="font-size:11px;color:var(--muted);margin-top:8px;display:block">Sorgulanıyor…</span></div>';
  try{
    const r1=await fetchSafe(`https://blockstream.info/api/address/${addr}`);
    const funded=r1.chain_stats.funded_txo_sum,spent2=r1.chain_stats.spent_txo_sum;
    const bal=(funded-spent2)/1e8,totalRec=funded/1e8,totalSnt=spent2/1e8,totalTx=r1.chain_stats.tx_count;
    const txs=(await fetchSafe(`https://blockstream.info/api/address/${addr}/txs`)).slice(0,6);
    const known=KNOWN_MAP[addr.toLowerCase()];
    const dName=label||known?.name||'Bilinmeyen Adres',dType=known?.type||'—',tClr=known?.color||'#94a3b8';
    const score=computeScore(addr,known),sl=scoreLabel(score);
    const totVol=totalRec+totalSnt;
    const rB=v=>{if(!v)return'0';if(v<1)return v.toFixed(2);if(v<10)return(Math.round(v*10)/10).toString();return Math.round(v).toLocaleString('tr-TR');};
    const rU=v=>{if(!v)return'$0';if(v<1e6)return'$'+(v/1e3).toFixed(0)+'K';if(v<1e9)return'$'+(v/1e6).toFixed(2)+'M';return'$'+(v/1e9).toFixed(2)+'B';};
    const txRows=txs.map(tx=>{
      let r=0,s2=0;
      (tx.vin||[]).forEach(v=>{if(v.prevout?.scriptpubkey_address===addr)s2+=v.prevout.value;});
      (tx.vout||[]).forEach(v=>{if(v.scriptpubkey_address===addr)r+=v.value;});
      const net=(r-s2)/1e8,isIn=net>0;
      const ca=[];
      if(isIn)(tx.vin||[]).forEach(v=>{if(v.prevout?.scriptpubkey_address&&v.prevout.scriptpubkey_address!==addr)ca.push(v.prevout.scriptpubkey_address);});
      else(tx.vout||[]).forEach(v=>{if(v.scriptpubkey_address&&v.scriptpubkey_address!==addr)ca.push(v.scriptpubkey_address);});
      const cEx2=ca.some(a=>EXCHANGES.has(a.toLowerCase())),cKn=ca.map(a=>KNOWN_MAP[a.toLowerCase()]).find(Boolean);
      const sum2=isIn?(cEx2?'Borsadan çekildi → soğuk cüzdana':cKn?cKn.name+' adresinden transfer':'Bilinmeyen kaynaktan giriş'):(cEx2?'Borsaya gönderildi ⚠':cKn?cKn.name+' adresine gönderildi':'Bilinmeyen adrese çıkış');
      const when=tx.status?.block_time?timeAgo(tx.status.block_time*1000):'Bekliyor';
      return`<div class="tx-item"><div class="tx-dir ${isIn?'d-in':'d-out'}">${isIn?'↓ GİRDİ':'↑ ÇIKTI'}</div>
        <div class="tx-body"><div class="tx-sum">${sum2}</div><div class="tx-meta">${when} · <a href="https://mempool.space/tx/${tx.txid}" target="_blank">${tx.txid.slice(0,10)}…↗</a></div></div>
        <div class="tx-amt" style="color:${isIn?'#4ade80':'#f87171'}">${(isIn?'+':'')+net.toFixed(4)}<br><span style="font-size:8px;color:var(--orange)">BTC</span></div></div>`;
    }).join('');
    res.innerHTML=`<div class="qr-top"><div style="min-width:0"><div class="qr-name">${esc(dName)}</div>
      <div class="qr-type" style="color:${tClr}">${dType} · ${addrType(addr)}</div>
      <div class="qr-addr"><a href="https://mempool.space/address/${addr}" target="_blank" style="color:var(--orange)">${addr.slice(0,14)}…${addr.slice(-5)} ↗</a></div>
      </div><div class="qr-bal"><div class="qr-btc">${bal.toFixed(4)}</div>
      <div style="font-size:8px;color:var(--orange);font-weight:700;margin-top:1px">BTC</div>
      <div class="qr-usd">${btcPrice?'$'+fmtUSD(bal*btcPrice):''}</div></div></div>
      <div class="score-box"><div><div style="font-size:8px;color:var(--muted);margin-bottom:3px;font-weight:700">EXPOSURE SCORE</div>
      <div class="score-num" style="color:${sl.color}">${score}</div></div>
      <span class="score-label ${sl.cls}">${sl.text}</span>
      <div style="flex:1;height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin:0 8px">
      <div style="height:4px;border-radius:2px;background:${sl.color};width:${score}%"></div></div></div>
      <div class="summary-box"><div class="summary-title">📊 Özet</div>
      <div class="summary-row"><span class="summary-label">Toplam İşlem</span><div class="summary-vals"><div class="summary-btc" style="color:var(--txt)">${totalTx.toLocaleString('tr-TR')}</div></div></div>
      <div class="summary-row"><span class="summary-label">Toplam Giriş</span><div class="summary-vals"><div class="summary-btc" style="color:#4ade80">+ ${rB(totalRec)} BTC</div>${btcPrice?`<div class="summary-usd">${rU(totalRec*btcPrice)}</div>`:''}</div></div>
      <div class="summary-row"><span class="summary-label">Toplam Çıkış</span><div class="summary-vals"><div class="summary-btc" style="color:#f87171">– ${rB(totalSnt)} BTC</div>${btcPrice?`<div class="summary-usd">${rU(totalSnt*btcPrice)}</div>`:''}</div></div>
      <div class="summary-row"><span class="summary-label">Toplam Hacim</span><div class="summary-vals"><div class="summary-btc" style="color:var(--orange)">${rB(totVol)} BTC</div>${btcPrice?`<div class="summary-usd">${rU(totVol*btcPrice)}</div>`:''}</div></div>
      <div class="summary-row"><span class="summary-label">Güncel Bakiye</span><div class="summary-vals"><div class="summary-btc">${rB(bal)} BTC</div>${btcPrice?`<div class="summary-usd">${rU(bal*btcPrice)}</div>`:''}</div></div></div>
      ${txs.length?`<div class="qr-tx-title">Son ${txs.length} İşlem</div>${txRows}`:'<div style="font-size:11px;color:var(--muted);padding:6px 0">İşlem bulunamadı</div>'}
      <div class="qr-actions"><button class="qbtn qbtn-s" style="flex:1" onclick="closeQR()">✕ Kapat</button>
      <a href="https://blockstream.info/address/${addr}" target="_blank" class="qbtn qbtn-s" style="text-decoration:none;text-align:center;flex:1">blockstream ↗</a></div>`;
  }catch(e){res.innerHTML=`<div style="padding:16px;color:#f87171;font-size:12px">Hata: ${esc(e.message)}</div>`;}
}
function closeQR(){document.getElementById('qr').style.display='none';document.getElementById('q-addr').value='';document.getElementById('q-name').value='';}

// ── HELPERS
function fmtUSD(v){if(v>=1e9)return(v/1e9).toFixed(2)+'B';if(v>=1e6)return(v/1e6).toFixed(2)+'M';if(v>=1e3)return(v/1e3).toFixed(1)+'K';return v.toFixed(0);}
function timeAgo(ts){const s=Math.floor((Date.now()-ts)/1000);if(s<60)return s+'sn önce';if(s<3600)return Math.floor(s/60)+'dk önce';return Math.floor(s/3600)+'sa önce';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function isValidBTC(a){return/^(1|3)[a-zA-HJ-NP-Z0-9]{25,34}$/.test(a)||/^bc1[a-z0-9]{39,87}$/i.test(a)||a.length>=26;}
function toast(msg,type=''){const t=document.createElement('div');t.className='toast '+type;t.innerHTML=msg.replace(/\n/g,'<br>');document.getElementById('toasts').appendChild(t);setTimeout(()=>t.remove(),type==='sell'||type==='buy'?10000:3500);}

async function init(){
  document.getElementById('s-total').textContent=ALL_ADDRS.length;
  document.getElementById('stats-bar').innerHTML=Object.entries(CAT_META).map(([cat,m])=>
    `<div class="cat-pill">${m.emoji} ${m.label} <span>${RAW[cat].length}</span></div>`).join('');
  renderStatusBar();
  document.getElementById('q-addr').addEventListener('keydown',e=>{if(e.key==='Enter')queryAddr();});
  await fetchPrice();
  setInterval(fetchPrice,60000);
  buildWsConnections();   // 3 WS bağlantısı → ~135 adres gerçek zamanlı
  startRestPolling();     // blockstream.info → tek API, yavaş ama hatasız tarama
  setInterval(renderStatusBar,4000);
}
init();
