body{font-family:'Inter',system-ui,sans-serif;background:#07090f;color:#c8cedd;min-height:100vh;font-size:14px}

/* TOPBAR */
.bar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;

.live{display:flex;align-items:center;gap:5px;font-size:11px;color:#22c55e;

.wrap{max-width:680px;margin:0 auto;padding:14px 12px 60px}

/* SON SİNYAL KARTI — ana ekran */

#signal-card.buy {background:rgba(22,163,74,.08); border-color:rgba(22,163,74,.35)}
#signal-card.sell{background:rgba(220,38,38,.08); border-color:rgba(220,38,38,.35)}
#signal-card.move{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.28)}
.sc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sc-badge{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px}
.badge-buy {background:rgba(22,163,74,.2); color:#4ade80;border:1px solid rgba(22,163,74,.4)}
.badge-sell{background:rgba(220,38,38,.2); color:#f87171;border:1px solid rgba(220,38,38,.4)}
.badge-move{background:rgba(245,158,11,.15);color:#fcd34d;border:1px solid rgba(245,158,11,.35)}
.sc-time{font-size:11px;color:#3d4460}
.sc-entity{font-size:16px;font-weight:800;margin-bottom:3px}
.sc-amount{font-family:monospace;font-size:22px;font-weight:800;margin-bottom:6px}

.sc-link:hover{color:#f7931a}

/* STATS */

.stat{background:#0e1118;border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:10px 12px;text-align:center}

.stat-v{font-size:22px;font-weight:800;font-family:monospace}
.cg{color:#22c55e}.cr{color:#ef4444}.co{color:#f7931a}

/* SİNYAL GEÇMİŞİ */

.sec-btn{font-size:10px;color:#4a5068;background:none;border:none;cursor:pointer}
.sec-btn:hover{color:#ef4444}

.log-item{display:flex;gap:10px;align-items:flex-start;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04)}
.log-item:last-child{border-bottom:none}

.d-sell{background:rgba(220,38,38,.15); color:#f87171;border:1px solid rgba(220,38,38,.3)}
.d-move{background:rgba(245,158,11,.12);color:#fcd34d;border:1px solid rgba(245,158,11,.3)}

.log-meta{font-size:10px;color:#3d4460;margin-top:3px}
.log-amt{text-align:right;flex-shrink:0}
.log-btc{font-family:monospace;font-size:13px;font-weight:700}

/* TOAST */
#toasts{position:fixed;bottom:14px;right:12px;z-index:999;display:flex;flex-direction:column;gap:5px;pointer-events:none;max-width:300px}
.toast{background:#161923;border:1px solid rgba(255,255,255,.1);border-radius:8px;

@keyframes tin{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}

// ══════════════════════════════════════════════════════════════
//  PARSE — WALLET_LIST string'ini nesnelere çevir
// ══════════════════════════════════════════════════════════════
function parseWallets() {
  const result = [];
  const addrIndex = {}; // adres → entity objesi
  WALLET_LIST.trim().split('\n').forEach(line => {
    line = line.trim();
    if (!line) return;
    const parts = line.split(';').map(p => p.trim()).filter(Boolean);
    if (parts.length < 3) return;
    const name = parts[0];
    const type = parts[1];
    const addrs = parts.slice(2);
    const entity = { name, type, addrs, bal: null, lastTxHash: null, lastCheck: null };
    result.push(entity);
    addrs.forEach(a => { addrIndex[a.toLowerCase()] = entity; });
  });
  return { entities: result, addrIndex };
}

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let { entities, addrIndex } = parseWallets();
let signalLog = [];
let btcPrice = 0;
let sBuy = 0, sSell = 0;
const MIN_BTC = 0.5; // minimum uyarı eşiği
const INTERVAL = 90; // saniye

// ══════════════════════════════════════════════════════════════
//  BAŞLAT
// ══════════════════════════════════════════════════════════════
async function init() {
  setStatus('Başlatılıyor…');
  fetchPrice();
  setInterval(fetchPrice, 60000);
  await runChecks();
  setInterval(runChecks, INTERVAL * 1000);
}

// ══════════════════════════════════════════════════════════════
//  FİYAT
// ══════════════════════════════════════════════════════════════
async function fetchPrice() {
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
    btcPrice = (await r.json()).bitcoin.usd;
  } catch {
    try {
      const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
      btcPrice = parseFloat((await r.json()).price);
    } catch {}
  }
  if (btcPrice) {
    document.getElementById('price-pill').textContent = '$' + btcPrice.toLocaleString('en-US');
    document.getElementById('s-price').textContent = '$' + (btcPrice/1000).toFixed(1) + 'K';
  }
}

// ══════════════════════════════════════════════════════════════
//  TÜM ENTİTYLERİ KONTROL ET
// ══════════════════════════════════════════════════════════════
async function runChecks() {
  let i = 0;
  for (const entity of entities) {
    i++;
    setStatus(`${i}/${entities.length} kontrol ediliyor`);
    for (const addr of entity.addrs) {
      await checkAddr(entity, addr);
      await sleep(300);
    }
  }
  setStatus(`${entities.length} cüzdan aktif — son: ${timeNow()}`);
}

async function checkAddr(entity, addr) {
  try {
    // 1) Adres bilgisi
    const r1 = await fetch(`https://mempool.space/api/address/${addr}`);
    if (!r1.ok) return;
    const info = await r1.json();
    const bal = (info.chain_stats.funded_txo_sum - info.chain_stats.spent_txo_sum) / 1e8;

    // 2) Son TX listesi
    const r2 = await fetch(`https://mempool.space/api/address/${addr}/txs`);
    if (!r2.ok) return;
    const txs = await r2.json();
    if (!txs || txs.length === 0) { entity.bal = bal; return; }

    const latest = txs[0];

    // İlk yüklemede sadece hash kaydet, sinyal üretme
    if (!entity.lastTxHash) {
      entity.bal = bal;
      entity.lastTxHash = latest.txid;
      return;
    }

    // Yeni TX var mı?
    if (entity.lastTxHash !== latest.txid) {
      entity.bal = bal;
      entity.lastTxHash = latest.txid;
      await analyzeTx(entity, addr, latest);
    }
  } catch {}
}

// ══════════════════════════════════════════════════════════════
//  TX ANALİZİ
// ══════════════════════════════════════════════════════════════
async function analyzeTx(entity, watchedAddr, tx) {
  // Net değişim hesapla
  let received = 0, sent = 0;
  const counterAddrs = [];

  for (const vin of (tx.vin || [])) {
    const a = vin.prevout?.scriptpubkey_address;
    if (a === watchedAddr) sent += vin.prevout.value;
    else if (a) counterAddrs.push(a);
  }
  for (const vout of (tx.vout || [])) {
    const a = vout.scriptpubkey_address;
    if (a === watchedAddr) received += vout.value;
    else if (a) counterAddrs.push(a);
  }

  const netBtc = (received - sent) / 1e8;
  if (Math.abs(netBtc) < MIN_BTC) return;

  // Karşı taraf analizi
  const counterIsExchange = counterAddrs.some(a => EXCHANGES.has(a.toLowerCase()));
  const counterEntity = counterAddrs.map(a => addrIndex[a.toLowerCase()]).find(Boolean);
  const counterName = counterEntity ? counterEntity.name
    : counterIsExchange ? 'Borsa Adresi' : null;

  // ── SİNYAL KARAR MANTIĞI ──
  let signalType, badge, summary;
  const btcAbs = Math.abs(netBtc);
  const usd = btcAbs * btcPrice;
  const btcStr = btcAbs.toFixed(4) + ' BTC';
  const usdStr = usd > 0 ? ' ($' + fmtUSD(usd) + ')' : '';

  if (netBtc > 0) {
    // Para GELDİ bu adrese
    if (counterIsExchange) {
      signalType = 'sell';
      badge = '🔴 SATIŞ HAZIRLIĞI';
      summary = `${entity.name}, bir BORSA adresinden ${btcStr}${usdStr} çekti. `
              + `Borsa çıkışı genellikle uzun vadeli saklama (birikim) ya da OTC alış anlamına gelir. `
              + `${entity.type === 'Borsa' ? 'Borsa arası iç transfer olabilir.' : 'Bullish sinyal olarak değerlendirilebilir.'}`;
    } else if (counterEntity) {
      signalType = 'move';
      badge = '🟡 KURUM ARASI';
      summary = `${entity.name}, ${counterName} adresinden ${btcStr}${usdStr} transfer aldı. Kurumlar arası hareket.`;
    } else {
      signalType = 'buy';
      badge = '🟢 GİRİŞ';
      summary = `${entity.name} cüzdanına ${btcStr}${usdStr} GİRDİ. Kaynak adres takip listesinde yok — OTC alım, miner ödülü veya bilinmeyen kaynak.`;
    }
  } else {
    // Para GİTTİ bu adresten
    if (counterIsExchange) {
      signalType = 'sell';
      badge = '🔴 SATIŞ SİNYALİ';
      summary = `${entity.name} (${entity.type}), BORSA adresine ${btcStr}${usdStr} GÖNDERDİ. `
              + `Kurumsal cüzdandan borsaya transfer — yakın vadede satış baskısı yaratabilir. `
              + `${entity.type === 'Miner' ? 'Miner üretim maliyeti satışı olabilir.' : ''}`;
    } else if (counterEntity) {
      signalType = 'move';
      badge = '🟡 TRANSFER';
      summary = `${entity.name}, ${counterName} adresine ${btcStr}${usdStr} gönderdi. Takip listesindeki başka bir kurum.`;
    } else {
      signalType = 'buy';
      badge = '🟢 ÇIKIŞ';
      summary = `${entity.name} cüzdanından ${btcStr}${usdStr} çıktı. Hedef adres bilinmiyor — OTC veya soğuk cüzdan transferi.`;
    }
  }

  const entry = {
    t: Date.now(), entity: entity.name, type: entity.type,
    btc: netBtc, usd, badge, signalType, summary, txHash: tx.txid,
  };

  signalLog.unshift(entry);
  if (signalLog.length > 40) signalLog.pop();

  if (signalType === 'sell') { sSell++; document.getElementById('s-sell').textContent = sSell; }
  else if (signalType === 'buy') { sBuy++; document.getElementById('s-buy').textContent = sBuy; }

  showSignalCard(entry);
  renderLog();
  toast(badge + '\n' + entity.name + ' — ' + btcStr, signalType);
}

// ══════════════════════════════════════════════════════════════
//  ANA SİNYAL KARTI
// ══════════════════════════════════════════════════════════════
function showSignalCard(e) {
  const card = document.getElementById('signal-card');
  card.className = e.signalType;
  card.style.display = 'block';

  const badge = document.getElementById('sc-badge');
  badge.textContent = e.badge;
  badge.className = 'sc-badge badge-' + e.signalType;

  document.getElementById('sc-time').textContent = timeAgo(e.t);
  document.getElementById('sc-entity').textContent = e.entity + ' · ' + e.type;
  document.getElementById('sc-entity').style.color = e.signalType==='sell'?'#f87171':e.signalType==='buy'?'#4ade80':'#fcd34d';

  const amt = document.getElementById('sc-amount');
  amt.textContent = (e.btc > 0 ? '+' : '') + e.btc.toFixed(4) + ' BTC' + (e.usd ? ' ≈ $' + fmtUSD(e.usd) : '');
  amt.style.color = e.signalType==='sell'?'#f87171':e.signalType==='buy'?'#4ade80':'#fcd34d';

  document.getElementById('sc-summary').textContent = e.summary;
  const link = document.getElementById('sc-link');
  link.href = 'https://mempool.space/tx/' + e.txHash;
  link.textContent = 'TX: ' + e.txHash.slice(0,16) + '… ↗';
}

// ══════════════════════════════════════════════════════════════
//  LOG RENDER
// ══════════════════════════════════════════════════════════════
function renderLog() {
  const el = document.getElementById('log-body');
  if (!signalLog.length) {
    el.innerHTML = '<div class="empty">İzleniyor… sinyal bekleniyor</div>';
    return;
  }
  el.innerHTML = signalLog.map(e => `
    <div class="log-item">
      <div class="log-dir d-${e.signalType}">${e.badge}</div>
      <div class="log-body">
        <div class="log-name">${esc(e.entity)} <span style="font-size:9px;color:#4a5068;font-weight:400">${e.type}</span></div>
        <div class="log-sum">${e.summary}</div>
        <div class="log-meta">${timeAgo(e.t)} · <a href="https://mempool.space/tx/${e.txHash}" target="_blank" style="color:#4a5068;font-family:monospace;text-decoration:none">${e.txHash.slice(0,12)}…↗</a></div>
      </div>
      <div class="log-amt">
        <div class="log-btc" style="color:${e.signalType==='sell'?'#f87171':e.signalType==='buy'?'#4ade80':'#fcd34d'}">${(e.btc>0?'+':'')+e.btc.toFixed(4)}</div>
        <div style="font-size:9px;color:#f7931a">BTC</div>
        <div class="log-usd">${e.usd?'$'+fmtUSD(e.usd):''}</div>
      </div>
    </div>`).join('');
}

function clearLog() {
  signalLog = []; sBuy = 0; sSell = 0;
  document.getElementById('s-buy').textContent = '0';
  document.getElementById('s-sell').textContent = '0';
  document.getElementById('signal-card').style.display = 'none';
  renderLog();
}

// ══════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════
function fmtUSD(v){if(v>=1e9)return(v/1e9).toFixed(2)+'B';if(v>=1e6)return(v/1e6).toFixed(2)+'M';if(v>=1e3)return(v/1e3).toFixed(1)+'K';return v.toFixed(0);}
function timeAgo(ts){const s=Math.floor((Date.now()-ts)/1000);if(s<60)return s+'sn önce';if(s<3600)return Math.floor(s/60)+'dk önce';return Math.floor(s/3600)+'sa önce';}
function timeNow(){return new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function setStatus(t){document.getElementById('status').textContent=t;}
function toast(msg,type=''){
  const t=document.createElement('div');t.className='toast '+type;
  t.innerHTML=msg.replace(/\n/g,'<br>');
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>t.remove(),type==='sell'||type==='buy'?9000:3500);
}

init();
</script>
</body>
</html>
