<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>BTC Whale Watch</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07090f;--card:#0d1017;--card2:#111520;--border:rgba(255,255,255,.07);
  --txt:#c8cedd;--muted:#4a5068;--dim:#2a2f40;
  --orange:#f7931a;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;font-size:14px;min-height:100vh;overscroll-behavior:none}

/* ── TOPBAR */
.bar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;height:52px;background:rgba(7,9,15,.98);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);
  padding-top:env(safe-area-inset-top,0)}
.logo{font-weight:800;font-size:16px;display:flex;align-items:center;gap:6px;letter-spacing:-.3px}
.logo em{color:var(--orange);font-style:normal}
.bar-r{display:flex;align-items:center;gap:6px}
.price-pill{font-family:'SF Mono',monospace;font-weight:700;color:var(--orange);font-size:13px;
  background:rgba(247,147,26,.1);border:1px solid rgba(247,147,26,.25);padding:5px 10px;border-radius:20px}
.live{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--green);
  background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.18);padding:4px 8px;border-radius:20px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}

/* Sound toggle button */
.sound-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;
  border-radius:50%;border:1px solid rgba(255,255,255,.12);background:none;cursor:pointer;
  font-size:16px;color:var(--txt);transition:all .2s}
.sound-btn.on{border-color:rgba(247,147,26,.4);background:rgba(247,147,26,.08);color:var(--orange)}
.sound-btn.off{opacity:.45}

.page{max-width:480px;margin:0 auto;padding:10px 10px calc(24px + var(--safe-bottom))}

/* ── BANNER */
#banner{display:none;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid}
#banner.buy {background:rgba(34,197,94,.07); border-color:rgba(34,197,94,.3)}
#banner.sell{background:rgba(239,68,68,.07); border-color:rgba(239,68,68,.3)}
#banner.move{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.25)}
.bn-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.bn-badge{font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px}
.bb-buy {background:rgba(34,197,94,.18); color:#4ade80;border:1px solid rgba(34,197,94,.4)}
.bb-sell{background:rgba(239,68,68,.18); color:#f87171;border:1px solid rgba(239,68,68,.4)}
.bb-move{background:rgba(245,158,11,.14);color:#fcd34d;border:1px solid rgba(245,158,11,.35)}
.bn-time{font-size:10px;color:var(--muted)}
.bn-entity{font-size:15px;font-weight:800;margin-bottom:2px}
.bn-amount{font-family:'SF Mono',monospace;font-size:22px;font-weight:800;margin-bottom:5px;letter-spacing:-.5px}
.bn-summary{font-size:12px;color:#8892aa;line-height:1.6;margin-bottom:8px}
.bn-link{font-size:10px;color:var(--muted);font-family:monospace;text-decoration:none}

/* ── STAT CARDS */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:left}
.stat-l{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:5px}
.stat-v{font-size:20px;font-weight:800;font-family:'SF Mono',monospace;letter-spacing:-.5px}
.stat-sub{font-size:10px;color:var(--muted);margin-top:2px}
.co{color:var(--orange)}.cg{color:var(--green)}.cr{color:var(--red)}.cy{color:var(--yellow)}

/* ── PROGRESS */
.progress-bar{height:2px;background:rgba(247,147,26,.1);margin-bottom:10px;border-radius:1px;overflow:hidden}
.progress-fill{height:2px;background:linear-gradient(90deg,var(--orange),#ffb347);border-radius:1px;transition:width .4s;width:0%}

/* ── SECTION */
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.sec-h{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.05)}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);display:flex;align-items:center;gap:6px}
.sec-count{font-size:9px;background:rgba(247,147,26,.12);color:var(--orange);padding:1px 7px;border-radius:10px}
.sec-act{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;white-space:nowrap;font-weight:600}

/* ── QUERY BOX */
.qbox{padding:12px}
.qrow{margin-bottom:8px}
.qrow input{width:100%;background:var(--bg);border:1px solid rgba(255,255,255,.1);color:var(--txt);
  padding:11px 12px;border-radius:10px;font-family:'SF Mono',monospace;font-size:12px;outline:none;
  -webkit-appearance:none;appearance:none;font-size:16px} /* 16px to prevent zoom on iOS */
.qrow input:focus{border-color:var(--orange)}
.qrow input::placeholder{color:var(--dim);font-size:13px}
.qrow2{display:flex;gap:8px}
.qrow2 input{flex:1;background:var(--bg);border:1px solid rgba(255,255,255,.1);color:var(--txt);
  padding:11px 12px;border-radius:10px;font-size:16px;outline:none;min-width:0;-webkit-appearance:none}
.qrow2 input:focus{border-color:var(--orange)}
.qrow2 input::placeholder{color:var(--dim);font-size:13px}
.qbtn{padding:11px 16px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;letter-spacing:.2px}
.qbtn-p{background:var(--orange);color:#000}
.qbtn-s{background:none;border:1px solid rgba(255,255,255,.12);color:var(--txt)}

/* ── QUERY RESULT */
#qr{display:none;border-top:1px solid var(--border);padding:14px}
.qr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:12px}
.qr-name{font-size:15px;font-weight:800;letter-spacing:-.2px}
.qr-type{font-size:10px;color:var(--muted);margin-top:2px;font-weight:600}
.qr-addr{font-family:monospace;font-size:9px;color:var(--muted);margin-top:3px}
.qr-addr a{color:var(--muted);text-decoration:none}
.qr-bal{text-align:right;flex-shrink:0}
.qr-btc{font-family:'SF Mono',monospace;font-size:22px;font-weight:800;color:var(--orange);letter-spacing:-.5px}
.qr-usd{font-size:11px;color:var(--muted);margin-top:1px}

/* Summary Box */
.summary-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px}
.summary-title{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;font-weight:700}
.summary-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.summary-row:last-child{border-bottom:none;padding-bottom:0}
.summary-label{font-size:11px;color:#8892aa}
.summary-vals{text-align:right}
.summary-btc{font-family:'SF Mono',monospace;font-size:12px;font-weight:700;color:var(--orange)}
.summary-usd{font-size:10px;color:var(--muted);margin-top:1px}

/* Stats grid */
.qr-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.qr-stat{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 6px;text-align:center}
.qr-stat-l{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:700}
.qr-stat-v{font-family:'SF Mono',monospace;font-size:14px;font-weight:700}

/* TX */
.qr-tx-title{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:8px;padding-top:12px;border-top:1px solid var(--border);font-weight:700}
.tx-item{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.tx-item:last-child{border-bottom:none}
.tx-dir{font-size:9px;font-weight:800;padding:3px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.d-in {background:rgba(34,197,94,.13); color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.d-out{background:rgba(239,68,68,.13); color:#f87171;border:1px solid rgba(239,68,68,.3)}
.tx-body{flex:1;min-width:0}
.tx-sum{font-size:11px;color:#8892aa;line-height:1.5}
.tx-meta{font-size:9px;color:var(--dim);margin-top:2px}
.tx-meta a{color:var(--dim);text-decoration:none;font-family:monospace}
.tx-amt{font-family:'SF Mono',monospace;font-size:12px;font-weight:700;text-align:right;white-space:nowrap;flex-shrink:0}
.qr-actions{display:flex;gap:8px;margin-top:12px}

/* Score */
.score-box{display:flex;align-items:center;gap:8px;margin:10px 0;padding:10px 12px;border-radius:10px;background:var(--bg);border:1px solid var(--border)}
.score-num{font-family:'SF Mono',monospace;font-size:24px;font-weight:800;letter-spacing:-.5px}
.score-label{font-size:9px;font-weight:800;padding:2px 9px;border-radius:20px}
.sl-low  {background:rgba(34,197,94,.15); color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.sl-med  {background:rgba(245,158,11,.15);color:#fcd34d;border:1px solid rgba(245,158,11,.3)}
.sl-high {background:rgba(239,68,68,.15); color:#f87171;border:1px solid rgba(239,68,68,.3)}
.sl-vhigh{background:rgba(239,68,68,.3);  color:#fca5a5;border:1px solid rgba(239,68,68,.5)}

/* Dup warning */
.dup-warn{display:flex;align-items:center;gap:6px;padding:9px 11px;border-radius:9px;
  background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.25);margin:6px 0;font-size:11px;color:#f87171;font-weight:600}

/* ── LOG */
.log-item{display:flex;gap:8px;align-items:flex-start;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04)}
.log-item:last-child{border-bottom:none}
.log-badge{font-size:9px;font-weight:800;padding:3px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.lb-buy {background:rgba(34,197,94,.14); color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.lb-sell{background:rgba(239,68,68,.14); color:#f87171;border:1px solid rgba(239,68,68,.3)}
.lb-move{background:rgba(245,158,11,.12);color:#fcd34d;border:1px solid rgba(245,158,11,.3)}
.log-mid{flex:1;min-width:0}
.log-name{font-size:12px;font-weight:700;margin-bottom:3px}
.log-sum{font-size:11px;color:#8892aa;line-height:1.55}
.log-meta{font-size:9px;color:var(--dim);margin-top:4px}
.log-meta a{color:var(--dim);text-decoration:none;font-family:monospace}
.log-right{text-align:right;flex-shrink:0}
.log-btc{font-family:'SF Mono',monospace;font-size:13px;font-weight:700;letter-spacing:-.3px}
.log-usd{font-size:9px;color:var(--muted);margin-top:2px}

.empty{text-align:center;padding:28px 16px;color:var(--dim);font-size:11px;line-height:1.8}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.08);border-top-color:var(--orange);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── TOASTS */
#toasts{position:fixed;bottom:calc(16px + var(--safe-bottom));left:50%;transform:translateX(-50%);z-index:999;
  display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none;width:90%;max-width:380px}
.toast{background:#161923;border:1px solid rgba(255,255,255,.1);border-radius:10px;
  padding:10px 16px;font-size:12px;animation:tin .25s ease;pointer-events:auto;line-height:1.5;text-align:center;width:100%;font-weight:500}
.toast.buy{border-color:rgba(34,197,94,.5);color:#4ade80;font-weight:700}
.toast.sell{border-color:rgba(239,68,68,.6);color:#f87171;font-weight:700;background:#1a0d0d}
.toast.warn{border-color:rgba(245,158,11,.5);color:#fcd34d;font-weight:700}
.toast.ok{border-color:rgba(34,197,94,.25)}
.toast.err{border-color:rgba(239,68,68,.3);color:#f87171}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Sound alert banner */
.alert-banner{display:none;position:fixed;top:52px;left:0;right:0;z-index:40;
  padding:10px 16px;text-align:center;font-size:13px;font-weight:700;letter-spacing:.2px;animation:flashin .3s ease}
.alert-banner.sell{background:rgba(239,68,68,.95);color:#fff}
.alert-banner.buy{background:rgba(34,197,94,.9);color:#000}
@keyframes flashin{0%{opacity:0;transform:translateY(-6px)}100%{opacity:1;transform:none}}
</style>
</head>
<body>

</div>

<script>
// ═══════════════════════════════════════════
//  SES SİSTEMİ
// ═══════════════════════════════════════════
let soundEnabled = true;
let audioCtx = null;

function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playAlert(type){
  if(!soundEnabled) return;
  try{
    const ctx = getAudioCtx();
    if(ctx.state === 'suspended') ctx.resume();

    if(type === 'sell'){
      // Sert uyarı sesi - 3 bip
      [0, 0.25, 0.5].forEach(delay => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'square';
        osc.frequency.setValueAtTime(880, ctx.currentTime + delay);
        osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + delay + 0.15);
        gain.gain.setValueAtTime(0.35, ctx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.15);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + 0.15);
      });
    } else if(type === 'buy'){
      // Pozitif ses - yükselen 3 nota
      [[523, 0], [659, 0.18], [784, 0.36]].forEach(([freq, delay]) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
        gain.gain.setValueAtTime(0.3, ctx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.2);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + 0.2);
      });
    } else {
      // Nötr tek bip
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 600;
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.2);
    }
  }catch(e){console.warn('Audio error:', e);}
}

function toggleSound(){
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('sound-btn');
  if(soundEnabled){
    btn.textContent = '🔔';
    btn.className = 'sound-btn on';
    // test sesi
    playAlert('move');
    toast('Ses bildirimi AÇık 🔔', 'ok');
  } else {
    btn.textContent = '🔕';
    btn.className = 'sound-btn off';
    toast('Ses bildirimi KAPALI 🔕', 'warn');
  }
}

// Ses aktif etmek için ilk dokunuşta AudioContext başlat
document.addEventListener('touchstart', function initAudio(){
  try{ getAudioCtx(); }catch(e){}
  document.removeEventListener('touchstart', initAudio);
}, {once:true});

function showAlertBanner(text, type){
  const b = document.getElementById('alert-banner');
  b.textContent = text;
  b.className = 'alert-banner ' + type;
  b.style.display = 'block';
  setTimeout(()=>{ b.style.display = 'none'; }, 6000);
}

//  KURUMSAL CÜZDAN LİSTESİ
// ═══════════════════════════════════════════

function parseWallets(){
  const entities=[],addrMap={};
  WALLET_LIST.trim().split('\n').forEach(line=>{
    line=line.trim();if(!line)return;
    const p=line.split(';').map(x=>x.trim()).filter(Boolean);
    if(p.length<3)return;
    const ent={name:p[0],type:p[1],addrs:p.slice(2),bal:null,lastTxHash:null,lastCheck:null};
    entities.push(ent);
    ent.addrs.forEach(a=>{addrMap[a.toLowerCase()]=ent;});
  });
  return{entities,addrMap};
}

function buildWatchList(){
  const seen={},dups=new Set();
  USER_WATCH_RAW.forEach(a=>{
    const k=a.toLowerCase();
    if(seen[k])dups.add(k);
    else seen[k]=1;
  });
  const unique=[...new Set(USER_WATCH_RAW.map(a=>a.trim()))];
  const list=unique.map(addr=>{
    const k=addr.toLowerCase();
    const known=addrMap[k];
    const isDup=dups.has(k);
    const score=computeScore(addr,known,isDup);
    return{addr,known,isDup,score,bal:null,lastTxHash:null,lastCheck:null};
  });
  return{list,dups};
}

function computeScore(addr,known,isDup){
  let s=20;
  if(addr.startsWith('bc1p')) s+=10;
  else if(addr.startsWith('bc1q')&&addr.length>50) s+=8;
  else if(addr.startsWith('bc1q')) s+=5;
  else if(addr.startsWith('3')) s+=15;
  else if(addr.startsWith('1')) s+=20;
  if(known){
    if(known.type==='Borsa') s+=30;
    else if(known.type==='ETF') s+=25;
    else if(known.type==='Hükümet') s+=35;
    else if(known.type==='Genesis') s+=40;
    else if(known.type==='Miner') s+=20;
    else s+=15;
  }else{
    const h=hashStr(addr);
    s+=h%25;
  }
  if(isDup) s+=10;
  return Math.min(s,99);
}
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h);}
function scoreLabel(s){
  if(s<35) return{text:'LOW',cls:'sl-low',color:'#4ade80'};
  if(s<55) return{text:'MED',cls:'sl-med',color:'#fcd34d'};
  if(s<75) return{text:'HIGH',cls:'sl-high',color:'#f87171'};
  return{text:'V.HIGH',cls:'sl-vhigh',color:'#fca5a5'};
}
function addrType(addr){
  if(addr.startsWith('bc1p')) return 'Taproot';
  if(addr.startsWith('bc1q')&&addr.length>50) return 'SegWit Long';
  if(addr.startsWith('bc1q')) return 'SegWit';
  if(addr.startsWith('3')) return 'P2SH';
  if(addr.startsWith('1')) return 'Legacy';
  return '?';
}

  const res=document.getElementById('qr');
  res.style.display='block';
  res.innerHTML='<div style="padding:20px;text-align:center"><div class="spin"></div><br><span style="font-size:11px;color:var(--muted);margin-top:8px;display:block">Blockchain sorgulanıyor…</span></div>';

  try{
    const r1=await fetch(`https://mempool.space/api/address/${addr}`);
    if(!r1.ok)throw new Error('mempool.space yanıt vermedi');
    const info=await r1.json();
    const funded=info.chain_stats.funded_txo_sum;
    const spent=info.chain_stats.spent_txo_sum;
    const bal=(funded-spent)/1e8;
    const totalReceived=funded/1e8;
    const totalSent=spent/1e8;
    const totalTx=info.chain_stats.tx_count;

    const r2=await fetch(`https://mempool.space/api/address/${addr}/txs`);
    const txs=r2.ok?(await r2.json()).slice(0,6):[];

    const knownEnt=addrMap[addr.toLowerCase()];
    const isExchange=EXCHANGES.has(addr.toLowerCase());
    const displayName=label||knownEnt?.name||(isExchange?'Bilinen Borsa':'Bilinmeyen Adres');
    const displayType=knownEnt?.type||(isExchange?'Borsa':'—');
    const typeColor=getTypeColor(displayType);

    const wItem=watchList.find(w=>w.addr.toLowerCase()===addr.toLowerCase());
    const isDup=dupSet.has(addr.toLowerCase());
    const score=wItem?wItem.score:computeScore(addr,knownEnt,isDup);
    const sl=scoreLabel(score);

    // Toplam hacim = giriş + çıkış
    const totalVolume = totalReceived + totalSent;
    const usdReceived = totalReceived * btcPrice;
    const usdSent = totalSent * btcPrice;
    const usdVolume = totalVolume * btcPrice;
    const usdBal = bal * btcPrice;

    const txRows=txs.map(tx=>{
      let recv=0,spentAmt=0;
      (tx.vin||[]).forEach(v=>{if(v.prevout?.scriptpubkey_address===addr)spentAmt+=v.prevout.value;});
      (tx.vout||[]).forEach(v=>{if(v.scriptpubkey_address===addr)recv+=v.value;});
      const net=(recv-spentAmt)/1e8;
      const isIn=net>0;
      const counterAddrs=[];
      if(isIn){(tx.vin||[]).forEach(v=>{if(v.prevout?.scriptpubkey_address&&v.prevout.scriptpubkey_address!==addr)counterAddrs.push(v.prevout.scriptpubkey_address);});}
      else{(tx.vout||[]).forEach(v=>{if(v.scriptpubkey_address&&v.scriptpubkey_address!==addr)counterAddrs.push(v.scriptpubkey_address);});}
      const counterEx=counterAddrs.some(a=>EXCHANGES.has(a.toLowerCase()));
      const counterKnown=counterAddrs.map(a=>addrMap[a.toLowerCase()]).find(Boolean);
      let summary;
      if(isIn){
        if(counterEx)summary='Borsadan çekildi → soğuk cüzdana';
        else if(counterKnown)summary=counterKnown.name+' adresinden transfer';
        else summary='Bilinmeyen kaynaktan giriş';
      }else{
        if(counterEx)summary='Borsaya gönderildi ⚠';
        else if(counterKnown)summary=counterKnown.name+' adresine gönderildi';
        else summary='Bilinmeyen adrese çıkış';
      }
      const when=tx.status?.block_time?timeAgo(tx.status.block_time*1000):'Bekliyor';
      return`<div class="tx-item">
        <div class="tx-dir ${isIn?'d-in':'d-out'}">${isIn?'↓ GİRDİ':'↑ ÇIKTI'}</div>
        <div class="tx-body">
          <div class="tx-sum">${summary}</div>
          <div class="tx-meta">${when} · <a href="https://mempool.space/tx/${tx.txid}" target="_blank">${tx.txid.slice(0,10)}…↗</a></div>
        </div>
        <div class="tx-amt" style="color:${isIn?'#4ade80':'#f87171'}">${(isIn?'+':'')+net.toFixed(4)}<br><span style="font-size:8px;color:var(--orange)">BTC</span></div>
      </div>`;
    }).join('');

    const isWatched=wItem||knownEnt;
    const dupHtml=isDup?`<div class="dup-warn">⚠ Mükerrer: Bu adres izleme listesinde birden fazla var.</div>`:'';

    // Yuvarlama fonksiyonu
    const roundBTC = (v) => {
      if(v===0) return '0';
      if(v < 1) return v.toFixed(2);
      if(v < 10) return Math.round(v * 10) / 10;
      return Math.round(v / 100) * 100 > 0 ? (Math.round(v / 100) * 100).toLocaleString('tr-TR') : Math.round(v).toLocaleString('tr-TR');
    };
    const roundUSD = (v) => {
      if(v===0) return '$0';
      if(v < 1000) return '$'+Math.round(v/100)*100;
      if(v < 1e6) return '$'+(Math.round(v/1000)).toLocaleString('tr-TR')+'.000';
      if(v < 1e9) return '$'+(v/1e6).toFixed(2)+'M';
      return '$'+(v/1e9).toFixed(2)+'B';
    };

    res.innerHTML=`
      <div class="qr-top">
        <div style="min-width:0">
          <div class="qr-name">${esc(displayName)}</div>
          <div class="qr-type" style="color:${typeColor}">${displayType} · ${addrType(addr)}</div>
          <div class="qr-addr"><a href="https://mempool.space/address/${addr}" target="_blank" style="color:var(--orange)">${addr.slice(0,14)}…${addr.slice(-5)} ↗</a></div>
        </div>
        <div class="qr-bal">
          <div class="qr-btc">${bal.toFixed(4)}</div>
          <div style="font-size:8px;color:var(--orange);font-weight:700;margin-top:1px">BTC</div>
          <div class="qr-usd">${btcPrice?'$'+fmtUSD(bal*btcPrice):''}</div>
        </div>
      </div>

      ${dupHtml}

      <div class="score-box">
        <div>
          <div style="font-size:8px;color:var(--muted);margin-bottom:3px;font-weight:700">EXPOSURE SCORE</div>
          <div class="score-num" style="color:${sl.color}">${score}</div>
        </div>
        <span class="score-label ${sl.cls}">${sl.text}</span>
        <div style="flex:1;height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin:0 8px">
          <div style="height:4px;border-radius:2px;background:${sl.color};width:${score}%"></div>
        </div>
      </div>

      <!-- ÖZET -->
      <div class="summary-box">
        <div class="summary-title">📊 Özet</div>
        <div class="summary-row">
          <span class="summary-label">Toplam İşlem</span>
          <div class="summary-vals">
            <div class="summary-btc" style="color:var(--txt)">${totalTx.toLocaleString('tr-TR')}</div>
          </div>
        </div>
        <div class="summary-row">
          <span class="summary-label">Toplam Giriş</span>
          <div class="summary-vals">
            <div class="summary-btc" style="color:#4ade80">+ ${roundBTC(totalReceived)} BTC</div>
            <div class="summary-usd">${btcPrice ? roundUSD(usdReceived) : ''}</div>
          </div>
        </div>
        <div class="summary-row">
          <span class="summary-label">Toplam Çıkış</span>
          <div class="summary-vals">
            <div class="summary-btc" style="color:#f87171">– ${roundBTC(totalSent)} BTC</div>
            <div class="summary-usd">${btcPrice ? roundUSD(usdSent) : ''}</div>
          </div>
        </div>
        <div class="summary-row">
          <span class="summary-label">Toplam Hacim</span>
          <div class="summary-vals">
            <div class="summary-btc" style="color:var(--orange)">${roundBTC(totalVolume)} BTC</div>
            <div class="summary-usd">${btcPrice ? roundUSD(usdVolume) : ''}</div>
          </div>
        </div>
        <div class="summary-row">
          <span class="summary-label">Güncel Bakiye</span>
          <div class="summary-vals">
            <div class="summary-btc">${roundBTC(bal)} BTC</div>
            <div class="summary-usd">${btcPrice ? roundUSD(usdBal) : ''}</div>
          </div>
        </div>
      </div>

      ${txs.length?`<div class="qr-tx-title">Son ${txs.length} İşlem</div>${txRows}`:'<div style="font-size:11px;color:var(--muted);padding:6px 0">İşlem bulunamadı</div>'}

      <div class="qr-actions">
        <button class="qbtn qbtn-s" style="flex:1" onclick="closeQR()">✕ Kapat</button>
        <a href="https://mempool.space/address/${addr}" target="_blank" class="qbtn qbtn-s" style="text-decoration:none;text-align:center;flex:1">mempool ↗</a>
      </div>`;
  }catch(e){
    res.innerHTML=`<div style="padding:16px;color:#f87171;font-size:12px">Hata: ${e.message}</div>`;
  }
}

function closeQR(){
  document.getElementById('qr').style.display='none';
  document.getElementById('q-addr').value='';
  document.getElementById('q-name').value='';
}

function fillQuery(addr,name){
  document.getElementById('q-addr').value=addr;
  document.getElementById('q-name').value=name||'';
  window.scrollTo({top:0,behavior:'smooth'});
  queryAddr();
}

// ═══════════════════════════════════════════
//  PERİYODİK KONTROL
// ═══════════════════════════════════════════
async function runChecks(){
  let i=0;
  const fill=document.getElementById('progress-fill');
  const all=entities;
  for(const ent of all){
    i++;
    if(fill) fill.style.width=Math.round(i/all.length*100)+'%';
    setStatus(`${i}/${all.length}`);
    for(const addr of(ent.addrs||[])){
      await checkAddr(ent,addr);
      await sleep(350);
    }
  }
  // watch listesi
  for(const w of watchList){
    if(!w.lastCheck||(Date.now()-w.lastCheck)>INTERVAL*1000){
      await fetchWatchBalance(w);
      await sleep(300);
    }
  }
  if(fill) fill.style.width='0%';
  setStatus(`${watchList.length} adres · ${timeNow()}`);
  if(!runChecks._firstDone){runChecks._firstDone=true;warnDuplicates();}
}

async function fetchWatchBalance(w){
  try{
    const r=await fetch(`https://mempool.space/api/address/${w.addr}`);
    if(!r.ok)return;
    const info=await r.json();
    w.bal=(info.chain_stats.funded_txo_sum-info.chain_stats.spent_txo_sum)/1e8;
    w.lastCheck=Date.now();
    const r2=await fetch(`https://mempool.space/api/address/${w.addr}/txs`);
    if(!r2.ok)return;
    const txs=await r2.json();
    if(!txs?.length)return;
    const latestHash=txs[0].txid;
    if(w.lastTxHash&&w.lastTxHash!==latestHash){
      const ent=w.known||{name:w.addr.slice(0,8)+'…',type:addrType(w.addr),addrs:[w.addr]};
      await analyzeTx(ent,w.addr,txs[0]);
    }
    w.lastTxHash=latestHash;
  }catch{}
}

async function checkAddr(entity,addr){
  try{
    const r1=await fetch(`https://mempool.space/api/address/${addr}`);
    if(!r1.ok)return;
    const info=await r1.json();
    entity.bal=(info.chain_stats.funded_txo_sum-info.chain_stats.spent_txo_sum)/1e8;
    const r2=await fetch(`https://mempool.space/api/address/${addr}/txs`);
    if(!r2.ok)return;
    const txs=await r2.json();
    if(!txs?.length){entity.lastCheck=Date.now();return;}
    const latestHash=txs[0].txid;
    entity.lastCheck=Date.now();
    if(entity.lastTxHash&&entity.lastTxHash!==latestHash)await analyzeTx(entity,addr,txs[0]);
    entity.lastTxHash=latestHash;
    const w=watchList.find(x=>x.addr.toLowerCase()===addr.toLowerCase());
    if(w){w.bal=entity.bal;w.lastCheck=Date.now();w.lastTxHash=latestHash;}
  }catch{}
}

// ═══════════════════════════════════════════
//  TX ANALİZİ
// ═══════════════════════════════════════════
async function analyzeTx(entity,watchAddr,tx){
  let recv=0,spentAmt=0;const counterAddrs=[];
  (tx.vin||[]).forEach(v=>{
    if(v.prevout?.scriptpubkey_address===watchAddr)spentAmt+=v.prevout.value;
    else if(v.prevout?.scriptpubkey_address)counterAddrs.push(v.prevout.scriptpubkey_address);
  });
  (tx.vout||[]).forEach(v=>{
    if(v.scriptpubkey_address===watchAddr)recv+=v.value;
    else if(v.scriptpubkey_address)counterAddrs.push(v.scriptpubkey_address);
  });
  const netBtc=(recv-spentAmt)/1e8;
  if(Math.abs(netBtc)<MIN_BTC)return;
  const counterEx=counterAddrs.some(a=>EXCHANGES.has(a.toLowerCase()));
  const counterEnt=counterAddrs.map(a=>addrMap[a.toLowerCase()]).find(Boolean);
  const btcAbs=Math.abs(netBtc);const usd=btcAbs*btcPrice;
  let signalType,badge,summary;
  if(netBtc>0){
    if(counterEx){signalType='buy';badge='🟢 BİRİKİM';summary=`${entity.name}, borsadan ${btcAbs.toFixed(4)} BTC çekti. Soğuk cüzdana — birikim sinyali.`;}
    else if(counterEnt){signalType='move';badge='🟡 TRANSFER';summary=`${entity.name}, ${counterEnt.name}'dan ${btcAbs.toFixed(4)} BTC aldı.`;}
    else{signalType='buy';badge='🟢 GİRİŞ';summary=`${entity.name} cüzdanına ${btcAbs.toFixed(4)} BTC girdi.`;}
  }else{
    if(counterEx){signalType='sell';badge='🔴 SATIŞ';summary=`${entity.name}, borsaya ${btcAbs.toFixed(4)} BTC gönderdi! Satış hazırlığı uyarısı.`;}
    else if(counterEnt){signalType='move';badge='🟡 TRANSFER';summary=`${entity.name}, ${counterEnt.name}'a ${btcAbs.toFixed(4)} BTC gönderdi.`;}
    else{signalType='move';badge='🟡 ÇIKIŞ';summary=`${entity.name} cüzdanından ${btcAbs.toFixed(4)} BTC çıktı.`;}
  }
  const entry={t:Date.now(),entity:entity.name,type:entity.type,btc:netBtc,usd,badge,signalType,summary,txHash:tx.txid};
  signalLog.unshift(entry);if(signalLog.length>50)signalLog.pop();
  if(signalType==='sell'){sSell++;document.getElementById('s-sell').textContent=sSell;}
  else if(signalType==='buy'){sBuy++;document.getElementById('s-buy').textContent=sBuy;}

  // 🔔 SES BİLDİRİMİ
  playAlert(signalType);

  // Flash banner
  const btcStr = (netBtc>0?'+':'') + netBtc.toFixed(4) + ' BTC';
  if(signalType==='sell'){
    showAlertBanner('🚨 SATIŞ: ' + entity.name + ' — ' + btcAbs.toFixed(4) + ' BTC borsaya gönderildi!', 'sell');
  } else if(signalType==='buy'){
    showAlertBanner('💚 BİRİKİM: ' + entity.name + ' — ' + btcAbs.toFixed(4) + ' BTC çekildi', 'buy');
  }

  showBanner(entry);renderLog();
  toast(badge + '\n' + entity.name + ' — ' + btcAbs.toFixed(4) + ' BTC', signalType==='sell'?'sell':'buy');
}

function warnDuplicates(){
  if(dupSet.size===0)return;
  const examples=[...dupSet].slice(0,2).map(a=>a.slice(0,10)+'…').join(', ');
  const entry={t:Date.now(),entity:'Sistem',type:'Kontrol',btc:0,usd:0,
    badge:'⚠ MÜKERRER',signalType:'move',
    summary:`${dupSet.size} adres listede çift kayıtlı: ${examples}`,
    txHash:''};
  signalLog.unshift(entry);
  renderLog();
}

// ── BANNER
function showBanner(e){
  const b=document.getElementById('banner');
  b.className=e.signalType;b.style.display='block';
  const badge=document.getElementById('bn-badge');
  badge.textContent=e.badge;badge.className='bn-badge bb-'+e.signalType;
  document.getElementById('bn-time').textContent=timeAgo(e.t);
  const ent=document.getElementById('bn-entity');
  ent.textContent=e.entity+' · '+e.type;
  ent.style.color=e.signalType==='sell'?'#f87171':e.signalType==='buy'?'#4ade80':'#fcd34d';
  const amt=document.getElementById('bn-amount');
  const sign=e.btc>0?'+':'';
  amt.textContent=sign+e.btc.toFixed(4)+' BTC'+(e.usd?' ≈ $'+fmtUSD(e.usd):'');
  amt.style.color=e.signalType==='sell'?'#f87171':e.signalType==='buy'?'#4ade80':'#fcd34d';
  document.getElementById('bn-summary').textContent=e.summary;
  const link=document.getElementById('bn-link');
  if(e.txHash&&e.txHash.length>10){link.href='https://mempool.space/tx/'+e.txHash;link.textContent='TX: '+e.txHash.slice(0,16)+'… ↗';}
  else{link.href='#';link.textContent='';}
}

function renderLog(){
  const el=document.getElementById('log-body');
  if(!signalLog.length){el.innerHTML='<div class="empty">İzleniyor…<br>Balina hareketi bekleniyor 🐋</div>';return;}
  el.innerHTML=signalLog.map(e=>`
    <div class="log-item" onclick="if('${e.txHash}')window.open('https://mempool.space/tx/${e.txHash}','_blank')">
      <div class="log-badge lb-${e.signalType}">${e.badge}</div>
      <div class="log-mid">
        <div class="log-name">${esc(e.entity)} <span style="font-size:9px;color:var(--muted);font-weight:400">${e.type}</span></div>
        <div class="log-sum">${e.summary}</div>
        <div class="log-meta">${timeAgo(e.t)}${e.txHash&&e.txHash.length>10?' · <a href="https://mempool.space/tx/'+e.txHash+'" target="_blank">'+e.txHash.slice(0,10)+'…↗</a>':''}</div>
      </div>
      <div class="log-right">
        <div class="log-btc" style="color:${e.signalType==='sell'?'#f87171':e.signalType==='buy'?'#4ade80':'#fcd34d'}">${(e.btc>0?'+':'')+e.btc.toFixed(4)}</div>
        <div style="font-size:8px;color:var(--orange);font-weight:700">BTC</div>
        ${e.usd?`<div class="log-usd">$${fmtUSD(e.usd)}</div>`:''}
      </div>
    </div>`).join('');
}

function clearLog(){
  signalLog=[];sBuy=0;sSell=0;
  document.getElementById('s-buy').textContent='0';
  document.getElementById('s-sell').textContent='0';
  document.getElementById('banner').style.display='none';
  renderLog();
}

// ── HELPERS
function getTypeColor(t){return t==='Borsa'?'#60a5fa':t==='ETF'?'#a78bfa':t==='Miner'?'#fbbf24':t==='Hükümet'?'#f87171':'#94a3b8';}
function fmtUSD(v){if(v>=1e9)return(v/1e9).toFixed(2)+'B';if(v>=1e6)return(v/1e6).toFixed(2)+'M';if(v>=1e3)return(v/1e3).toFixed(1)+'K';return v.toFixed(0);}
function timeAgo(ts){const s=Math.floor((Date.now()-ts)/1000);if(s<60)return s+'sn önce';if(s<3600)return Math.floor(s/60)+'dk önce';return Math.floor(s/3600)+'sa önce';}
function timeNow(){return new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function setStatus(t){document.getElementById('status').textContent=t;}
function isValidBTC(a){return/^(1|3)[a-zA-HJ-NP-Z0-9]{25,34}$/.test(a)||/^bc1[a-z0-9]{39,87}$/i.test(a)||a.length>=26;}
function toast(msg,type=''){
  const t=document.createElement('div');t.className='toast '+type;
  t.innerHTML=msg.replace(/\n/g,'<br>');
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>t.remove(),type==='sell'||type==='buy'?10000:3500);
}

init();
</script>
