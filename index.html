<html lang="tr">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: #07090f; color: #c8cedd; min-height: 100vh; font-size: 13px; }

/* TOPBAR */
.bar { position: sticky; top: 0; z-index: 100; height: 50px; padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(7,9,15,.97); border-bottom: 1px solid rgba(255,255,255,.08); }
.logo { font-size: 15px; font-weight: 800; }
.logo em { color: #f7931a; font-style: normal; }
.bar-r { display: flex; align-items: center; gap: 8px; }
.price-pill { font-family: monospace; font-size: 12px; font-weight: 700; color: #f7931a;
  background: rgba(247,147,26,.07); border: 1px solid rgba(247,147,26,.2); padding: 4px 12px; border-radius: 20px; }
.live { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #22c55e;
  background: rgba(34,197,94,.06); border: 1px solid rgba(34,197,94,.15); padding: 4px 10px; border-radius: 20px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; animation: blink 1.8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

.wrap { max-width: 1100px; margin: 0 auto; padding: 20px 16px 60px; }

/* SİNYAL BANNER */
#sig-bar { display: none; border-radius: 8px; padding: 12px 16px; margin-bottom: 14px; border: 1px solid; }
#sig-bar.buy  { background: rgba(22,163,74,.1);  border-color: rgba(22,163,74,.4); }
#sig-bar.sell { background: rgba(220,38,38,.1);  border-color: rgba(220,38,38,.4); }
#sig-bar.move { background: rgba(245,158,11,.08); border-color: rgba(245,158,11,.3); }
.sig-row { display: flex; align-items: flex-start; gap: 14px; flex-wrap: wrap; }
.sig-badge { font-size: 12px; font-weight: 800; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
.badge-buy  { background: rgba(22,163,74,.2);  color: #4ade80; border: 1px solid rgba(22,163,74,.4); }
.badge-sell { background: rgba(220,38,38,.2);  color: #f87171; border: 1px solid rgba(220,38,38,.4); }
.badge-move { background: rgba(245,158,11,.15); color: #fcd34d; border: 1px solid rgba(245,158,11,.35); }
.sig-main { flex: 1; }
.sig-title { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
.sig-text  { font-size: 12px; color: #8892aa; line-height: 1.5; }
.sig-amt   { font-family: monospace; font-size: 18px; font-weight: 700; white-space: nowrap; text-align: right; }
.amt-buy  { color: #4ade80; }
.amt-sell { color: #f87171; }
.amt-move { color: #fcd34d; }
.sig-usd  { font-size: 10px; color: #4a5068; text-align: right; }
.sig-close { background: none; border: 1px solid rgba(255,255,255,.1); color: #4a5068;
  padding: 3px 8px; border-radius: 6px; cursor: pointer; font-size: 11px; align-self: flex-start; }
.sig-close:hover { color: #f87171; border-color: rgba(220,38,38,.4); }

/* CÜZDAN EKLE */
.add-box { background: #0e1118; border: 1px solid rgba(255,255,255,.07); border-radius: 8px;
  padding: 14px 16px; margin-bottom: 14px; }
.add-box h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .7px; color: #4a5068; margin-bottom: 10px; }
.add-row { display: flex; gap: 8px; flex-wrap: wrap; }
.add-row input { flex: 1; min-width: 200px; background: #07090f; border: 1px solid rgba(255,255,255,.1);
  color: #c8cedd; padding: 7px 11px; border-radius: 6px; font-family: monospace; font-size: 12px; outline: none; }
.add-row input:focus { border-color: #f7931a; }
.add-row input::placeholder { color: #3d4460; }
.btn { padding: 7px 16px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-o { background: #f7931a; color: #000; }
.btn-o:hover { background: #e08010; }
.btn-g { background: none; border: 1px solid rgba(255,255,255,.1); color: #c8cedd; }
.btn-g:hover { border-color: #f7931a; color: #f7931a; }

/* STATS */
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 14px; }
.stat { background: #0e1118; border: 1px solid rgba(255,255,255,.06); border-radius: 8px; padding: 10px 13px; }
.stat-l { font-size: 9px; text-transform: uppercase; letter-spacing: .7px; color: #4a5068; margin-bottom: 3px; }
.stat-v { font-size: 20px; font-weight: 800; font-family: monospace; }
.c-o { color: #f7931a; } .c-g { color: #22c55e; } .c-r { color: #ef4444; } .c-y { color: #fbbf24; }

/* LOG */
.log-panel { background: #0e1118; border: 1px solid rgba(255,255,255,.06); border-radius: 8px; overflow: hidden; margin-bottom: 14px; }
.log-header { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,.06); display: flex; align-items: center; justify-content: space-between; }
.log-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: #5e6882; }
.log-clear { font-size: 10px; color: #4a5068; cursor: pointer; background: none; border: none; }
.log-clear:hover { color: #ef4444; }
.log-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,.04); animation: fadeIn .3s ease; }
.log-item:last-child { border-bottom: none; }
@keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }
.log-dir { font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
.ld-buy  { background: rgba(22,163,74,.15);  color: #4ade80; border: 1px solid rgba(22,163,74,.3); }
.ld-sell { background: rgba(220,38,38,.15);  color: #f87171; border: 1px solid rgba(220,38,38,.3); }
.ld-move { background: rgba(245,158,11,.12); color: #fcd34d; border: 1px solid rgba(245,158,11,.3); }
.log-body { flex: 1; min-width: 0; }
.log-name { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
.log-sum  { font-size: 11px; color: #8892aa; line-height: 1.5; margin-bottom: 2px; }
.log-meta { font-size: 10px; color: #3d4460; }
.log-amt  { text-align: right; flex-shrink: 0; }
.log-btc  { font-family: monospace; font-size: 13px; font-weight: 700; }
.log-usd  { font-size: 9px; color: #3d4460; margin-top: 2px; }
.empty-msg { text-align: center; padding: 24px; color: #3d4460; font-size: 12px; }

/* CÜZDAN LİSTESİ */
.wallets { background: #0e1118; border: 1px solid rgba(255,255,255,.06); border-radius: 8px; overflow: hidden; }
.wallet-item { display: grid; grid-template-columns: 40px 1fr auto auto auto; align-items: center; gap: 12px;
  padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,.04); transition: background .15s; }
.wallet-item:last-child { border-bottom: none; }
.wallet-item:hover { background: rgba(255,255,255,.015); }
.w-rank { font-family: monospace; font-size: 11px; color: #3d4460; }
.w-info { min-width: 0; }
.w-name { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
.w-addr { font-family: monospace; font-size: 10px; color: #4a5068; }
.w-addr a { color: #4a5068; text-decoration: none; }
.w-addr a:hover { color: #f7931a; }
.w-type { font-size: 9px; color: #4a5068; margin-top: 2px; }
.w-bal  { text-align: right; font-family: monospace; }
.w-btc  { font-size: 12px; font-weight: 700; color: #f7931a; }
.w-usd  { font-size: 9px; color: #4a5068; margin-top: 1px; }
.w-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.w-del  { background: none; border: 1px solid rgba(255,255,255,.06); color: #4a5068;
  padding: 2px 7px; border-radius: 5px; cursor: pointer; font-size: 10px; }
.w-del:hover { border-color: rgba(220,38,38,.4); color: #ef4444; }
.w-sig-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* TOASTS */
#toasts { position: fixed; bottom: 16px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
.toast { background: #161923; border: 1px solid rgba(255,255,255,.1); border-radius: 8px;
  padding: 9px 14px; font-size: 12px; max-width: 340px; animation: tin .2s ease; pointer-events: auto; line-height: 1.5; }
.toast.buy  { border-color: rgba(22,163,74,.5);  color: #4ade80; font-weight: 600; }
.toast.sell { border-color: rgba(220,38,38,.5);  color: #f87171; font-weight: 600; }
.toast.ok   { border-color: rgba(34,197,94,.3); }
.toast.err  { border-color: rgba(220,38,38,.3);  color: #f87171; }
@keyframes tin { from { transform: translateX(10px); opacity: 0; } to { transform: none; opacity: 1; } }

.spin { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,.1);
  border-top-color: #f7931a; border-radius: 50%; animation: sp .7s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }

@media(max-width:700px) { .stats { grid-template-columns: repeat(2,1fr); } .wallet-item { grid-template-columns: 1fr auto auto; } .w-rank,.w-bal { display: none; } }

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let wallets = [];   // { addr, name, type, bal, lastTxHash, lastCheck }
let signalLog = [];
let btcPrice = 0;
let sBuy = 0, sSell = 0, sTotal = 0;
let checkQueue = [];
let checking = false;

// ═══════════════════════════════════════════════
// BAŞLAT
// ═══════════════════════════════════════════════
async function init() {
  // LocalStorage'dan yükle (önceden eklenenler)
  const saved = JSON.parse(localStorage.getItem('btc_wallets') || '[]');
  wallets = saved;

  // Preset listesini ekle (kayıtlı olmayanları)
  for (const p of PRESET_WALLETS) {
    if (!wallets.find(w => w.addr === p.addr)) {
      wallets.push({ addr: p.addr, name: p.name, type: p.type, bal: null, lastTxHash: null, lastCheck: null });
    }
  }
  saveWallets();
  renderWallets();

  fetchPrice();
  setInterval(fetchPrice, 60000);

  // İlk kontrol
  await checkAll();
  // Periyodik kontrol
  setInterval(checkAll, CHECK_INTERVAL * 1000);

  document.getElementById('in-addr').addEventListener('keydown', e => { if (e.key === 'Enter') addWallet(); });
}

// ═══════════════════════════════════════════════
// FİYAT
// ═══════════════════════════════════════════════
async function fetchPrice() {
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
    const d = await r.json();
    btcPrice = d.bitcoin.usd;
    document.getElementById('price-pill').textContent = '$' + btcPrice.toLocaleString('en-US');
    document.getElementById('s-price').textContent = '$' + btcPrice.toLocaleString('en-US');
  } catch {
    try {
      const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
      const d = await r.json();
      btcPrice = parseFloat(d.price);
      document.getElementById('price-pill').textContent = '$' + btcPrice.toLocaleString('en-US');
      document.getElementById('s-price').textContent = '$' + btcPrice.toLocaleString('en-US');
    } catch {}
  }
}

// ═══════════════════════════════════════════════
// TÜM CÜZDANLARI KONTROL ET
// Mempool.space API — tamamen ücretsiz, kayıt yok
// ═══════════════════════════════════════════════
async function checkAll() {
  document.getElementById('status-lbl').textContent = 'Kontrol ediliyor…';
  let i = 0;
  for (const w of wallets) {
    i++;
    document.getElementById('status-lbl').textContent = `Kontrol: ${i}/${wallets.length}`;
    await checkWallet(w);
    await sleep(400); // rate limit için küçük bekleme
  }
  document.getElementById('status-lbl').textContent = wallets.length + ' cüzdan aktif';
  renderWallets();
}

async function checkWallet(w) {
  try {
    // Mempool.space — ücretsiz, CORS destekli
    const r = await fetch(`https://mempool.space/api/address/${w.addr}`);
    if (!r.ok) return;
    const d = await r.json();

    const newBal = (d.chain_stats.funded_txo_sum - d.chain_stats.spent_txo_sum) / 1e8;
    const totalTx = d.chain_stats.tx_count + d.mempool_stats.tx_count;

    // Son TX hash'ini al
    const txR = await fetch(`https://mempool.space/api/address/${w.addr}/txs`);
    if (!txR.ok) return;
    const txs = await txR.json();
    if (!txs || txs.length === 0) { w.bal = newBal; w.lastCheck = Date.now(); return; }

    const latestTx = txs[0];
    const latestHash = latestTx.txid;

    // Bakiye ve TX bilgisini güncelle
    w.bal = newBal;
    w.lastCheck = Date.now();

    // Eğer yeni TX varsa sinyal üret
    if (w.lastTxHash && w.lastTxHash !== latestHash) {
      await analyzeNewTx(w, latestTx);
    }

    w.lastTxHash = latestHash;
  } catch (e) {
    // sessiz fail
  }
}

// ═══════════════════════════════════════════════
// TX ANALİZİ — giriş mi çıkış mı, borsa mı?
// ═══════════════════════════════════════════════
async function analyzeNewTx(wallet, tx) {
  // Bu cüzdana gelen mi giden mi hesapla
  let received = 0, sent = 0;

  for (const vin of (tx.vin || [])) {
    if (vin.prevout?.scriptpubkey_address === wallet.addr) {
      sent += vin.prevout.value;
    }
  }
  for (const vout of (tx.vout || [])) {
    if (vout.scriptpubkey_address === wallet.addr) {
      received += vout.value;
    }
  }

  const netSat = received - sent;
  const netBtc = netSat / 1e8;
  if (Math.abs(netBtc) < MIN_BTC_ALERT) return;

  // Karşı taraf adreslerini topla
  const counterAddrs = [];
  if (netBtc > 0) {
    // Giriş: parayı gönderen adresleri topla
    for (const vin of (tx.vin || [])) {
      if (vin.prevout?.scriptpubkey_address && vin.prevout.scriptpubkey_address !== wallet.addr) {
        counterAddrs.push(vin.prevout.scriptpubkey_address);
      }
    }
  } else {
    // Çıkış: paranın gittiği adresleri topla
    for (const vout of (tx.vout || [])) {
      if (vout.scriptpubkey_address && vout.scriptpubkey_address !== wallet.addr) {
        counterAddrs.push(vout.scriptpubkey_address);
      }
    }
  }

  // Karşı taraf borsa mı?
  const counterIsExchange = counterAddrs.some(a => EXCHANGE_ADDRS.has(a.toLowerCase()));
  const counterIsTracked = wallets.find(w => counterAddrs.includes(w.addr));

  // Sinyal türünü belirle + özet metin yaz
  let signal, summary, signalType;

  if (netBtc > 0) {
    // Para GELDİ (received)
    if (counterIsExchange) {
      signal = '🔴 SATIŞ SİNYALİ';
      signalType = 'sell';
      summary = `${wallet.name} (${wallet.type}), bilinen bir BORSA adresinden ${Math.abs(netBtc).toFixed(4)} BTC aldı. `
              + `Bu genellikle borsadan çekim — birikim veya güvenli saklama anlamına gelir. `
              + (wallet.type === 'Borsa' ? `Borsa→Borsa transferi, iç hareket olabilir.` : `Kurumsal alış sinyali olarak değerlendirilebilir.`);
    } else if (counterIsTracked) {
      signal = '🟡 TRANSFER';
      signalType = 'move';
      summary = `${wallet.name}, takip listenizdeki başka bir cüzdandan ${Math.abs(netBtc).toFixed(4)} BTC aldı. `
              + `Kurumlar arası transfer veya iç hareket.`;
    } else {
      signal = '🟢 GİRİŞ';
      signalType = 'buy';
      summary = `${wallet.name} (${wallet.type}) cüzdanına ${Math.abs(netBtc).toFixed(4)} BTC GİRDİ. `
              + `Gönderen adres bilinmiyor — OTC alım, miner ödülü veya özel transfer olabilir.`;
    }
  } else {
    // Para GİTTİ (sent)
    if (counterIsExchange) {
      signal = '🔴 SATIŞ SİNYALİ';
      signalType = 'sell';
      summary = `${wallet.name} (${wallet.type}), BORSA adresine ${Math.abs(netBtc).toFixed(4)} BTC GÖNDERDİ. `
              + `Bu klasik satış hazırlığı sinyalidir — kurumsal cüzdandan borsaya transfer, yakın vadede satış baskısı yaratabilir. `
              + (wallet.type === 'Miner' ? `Miner satışı — üretim maliyeti karşılama amacıyla olabilir.` : '');
    } else if (counterIsTracked) {
      signal = '🟡 TRANSFER';
      signalType = 'move';
      summary = `${wallet.name}, takip listenizdeki başka bir cüzdana ${Math.abs(netBtc).toFixed(4)} BTC gönderdi. `
              + `İç hareket veya kurumlar arası transfer.`;
    } else {
      signal = '🟢 ÇIKIŞ';
      signalType = 'buy';
      summary = `${wallet.name} (${wallet.type}) cüzdanından ${Math.abs(netBtc).toFixed(4)} BTC ÇIKTI. `
              + `Hedef adres bilinmiyor — OTC satış, bağış veya özel transfer olabilir.`;
    }
  }

  const entry = {
    time: Date.now(),
    walletName: wallet.name,
    walletType: wallet.type,
    walletAddr: wallet.addr,
    txHash: tx.txid,
    btc: netBtc,
    usd: Math.abs(netBtc) * btcPrice,
    signal, signalType, summary,
    counterIsExchange,
  };

  signalLog.unshift(entry);
  if (signalLog.length > 50) signalLog.pop();

  if (signalType === 'sell') { sSell++; document.getElementById('s-sell').textContent = sSell; }
  else if (signalType === 'buy') { sBuy++; document.getElementById('s-buy').textContent = sBuy; }
  sTotal++;
  document.getElementById('s-total').textContent = sTotal;

  showBanner(entry);
  renderLog();
  playToast(entry);
}

// ═══════════════════════════════════════════════
// BANNER
// ═══════════════════════════════════════════════
function showBanner(e) {
  const bar = document.getElementById('sig-bar');
  bar.className = e.signalType;
  bar.style.display = 'block';

  const badge = document.getElementById('sig-badge');
  badge.textContent = e.signal;
  badge.className = 'sig-badge badge-' + e.signalType;

  document.getElementById('sig-title').textContent = e.walletName + ' — ' + e.walletType;
  document.getElementById('sig-title').style.color = e.signalType === 'sell' ? '#f87171' : e.signalType === 'buy' ? '#4ade80' : '#fcd34d';
  document.getElementById('sig-text').textContent = e.summary;

  const amt = document.getElementById('sig-amt');
  amt.textContent = (e.btc > 0 ? '+' : '') + e.btc.toFixed(4) + ' BTC';
  amt.className = 'sig-amt amt-' + e.signalType;

  document.getElementById('sig-usd').textContent = e.usd ? '≈ $' + fmtUSD(e.usd) : '';
}

// ═══════════════════════════════════════════════
// LOG RENDER
// ═══════════════════════════════════════════════
function renderLog() {
  const el = document.getElementById('log-body');
  if (!signalLog.length) { el.innerHTML = '<div class="empty-msg">Henüz sinyal yok — cüzdanlar izleniyor…</div>'; return; }
  el.innerHTML = signalLog.map(e => `
    <div class="log-item">
      <div class="log-dir ld-${e.signalType}">${e.signal}</div>
      <div class="log-body">
        <div class="log-name">${e.walletName} <span style="font-size:9px;color:#4a5068;font-weight:400">${e.walletType}</span></div>
        <div class="log-sum">${e.summary}</div>
        <div class="log-meta">
          ${timeAgo(e.time)} ·
          <a href="https://mempool.space/tx/${e.txHash}" target="_blank" style="color:#4a5068;text-decoration:none;font-family:monospace">${e.txHash.slice(0,12)}…↗</a>
        </div>
      </div>
      <div class="log-amt">
        <div class="log-btc" style="color:${e.signalType==='sell'?'#f87171':e.signalType==='buy'?'#4ade80':'#fcd34d'}">${(e.btc>0?'+':'')+e.btc.toFixed(4)}</div>
        <div style="font-size:9px;color:#f7931a;font-weight:600">BTC</div>
        <div class="log-usd">${e.usd?'$'+fmtUSD(e.usd):''}</div>
      </div>
    </div>`).join('');
}

function clearLog() {
  signalLog = []; sBuy = 0; sSell = 0; sTotal = 0;
  ['s-buy','s-sell','s-total'].forEach(id => document.getElementById(id).textContent = '0');
  document.getElementById('sig-bar').style.display = 'none';
  renderLog();
}

// ═══════════════════════════════════════════════
// CÜZDAN LIST RENDER
// ═══════════════════════════════════════════════
function renderWallets() {
  const el = document.getElementById('wallet-rows');
  if (!wallets.length) { el.innerHTML = '<div class="empty-msg">Henüz cüzdan eklenmedi.</div>'; return; }
  el.innerHTML = wallets.map((w, i) => {
    const bal = w.bal != null ? w.bal.toFixed(4) + ' BTC' : '…';
    const usd = w.bal != null && btcPrice ? '$' + fmtUSD(w.bal * btcPrice) : '';
    const short = w.addr.length > 20 ? w.addr.slice(0,8) + '…' + w.addr.slice(-6) : w.addr;
    const typeColor = w.type === 'Borsa' ? '#60a5fa'
      : w.type === 'ETF' ? '#a78bfa'
      : w.type === 'Miner' ? '#fbbf24'
      : w.type === 'Hükümet' ? '#f87171'
      : '#94a3b8';
    return `<div class="wallet-item">
      <div class="w-rank">#${i+1}</div>
      <div class="w-info">
        <div class="w-name">${esc(w.name)}</div>
        <div class="w-addr"><a href="https://mempool.space/address/${w.addr}" target="_blank">${short}</a></div>
        <div class="w-type" style="color:${typeColor}">${w.type}</div>
      </div>
      <div class="w-bal">
        <div class="w-btc">${bal}</div>
        <div class="w-usd">${usd}</div>
      </div>
      <div class="w-status" style="background:${w.lastCheck ? '#22c55e' : '#3d4460'}"></div>
      <button class="w-del" onclick="removeWallet('${w.addr}')">✕</button>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
// CÜZDAN EKLE / KALDIR
// ═══════════════════════════════════════════════
function addWallet() {
  const addr = document.getElementById('in-addr').value.trim();
  const name = document.getElementById('in-name').value.trim() || shortAddr(addr);
  const type = document.getElementById('in-type').value.trim() || 'Bilinmiyor';
  if (!addr) { toast('Adres boş', 'err'); return; }
  if (!isValidBTC(addr)) { toast('Geçersiz BTC adresi', 'err'); return; }
  if (wallets.find(w => w.addr === addr)) { toast('Bu adres zaten listede', 'err'); return; }
  wallets.push({ addr, name, type, bal: null, lastTxHash: null, lastCheck: null });
  saveWallets(); renderWallets();
  document.getElementById('in-addr').value = '';
  document.getElementById('in-name').value = '';
  document.getElementById('in-type').value = '';
  toast(name + ' eklendi', 'ok');
  // Hemen kontrol et
  const w = wallets[wallets.length - 1];
  checkWallet(w).then(() => renderWallets());
}

function removeWallet(addr) {
  wallets = wallets.filter(w => w.addr !== addr);
  saveWallets(); renderWallets();
}

async function refreshAll() {
  toast('Güncelleniyor…', 'ok');
  await checkAll();
  toast('Tamamlandı', 'ok');
}

function saveWallets() {
  localStorage.setItem('btc_wallets', JSON.stringify(wallets));
}

// ═══════════════════════════════════════════════
// TOAST & SES
// ═══════════════════════════════════════════════
function playToast(e) {
  const msg = e.signal + '\n' + e.walletName + ' — ' + Math.abs(e.btc).toFixed(4) + ' BTC';
  toast(msg, e.signalType === 'sell' ? 'sell' : 'buy');
}

function toast(msg, type = '') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = msg.replace(/\n/g, '<br>');
  document.getElementById('toasts').appendChild(t);
  setTimeout(() => t.remove(), type === 'sell' || type === 'buy' ? 9000 : 3500);
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function fmtUSD(v) {
  if (v >= 1e9) return (v/1e9).toFixed(2) + 'B';
  if (v >= 1e6) return (v/1e6).toFixed(2) + 'M';
  if (v >= 1e3) return (v/1e3).toFixed(1) + 'K';
  return v.toFixed(0);
}
function shortAddr(a) { return a.slice(0,6) + '…' + a.slice(-4); }
function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return s + 'sn önce';
  if (s < 3600) return Math.floor(s/60) + 'dk önce';
  return Math.floor(s/3600) + 'sa önce';
}
function isValidBTC(a) {
  return /^(1|3)[a-zA-HJ-NP-Z0-9]{25,34}$/.test(a) || /^bc1[a-z0-9]{39,87}$/i.test(a);
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

init();
