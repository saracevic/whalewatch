<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>BTC Whale Watch</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--card:#0d1017;--border:rgba(255,255,255,.07);
  --txt:#c8cedd;--muted:#4a5068;--dim:#2a2f40;
  --orange:#f7931a;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
}
html,body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh;-webkit-tap-highlight-color:transparent}

/* ── TOP BAR ── */
.bar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;height:48px;background:rgba(7,9,15,.98);border-bottom:1px solid var(--border);backdrop-filter:blur(8px)}
.logo{font-weight:800;font-size:15px;display:flex;align-items:center;gap:6px}
.logo em{color:var(--orange);font-style:normal}
.bar-r{display:flex;align-items:center;gap:6px}
.price-pill{font-family:monospace;font-weight:700;color:var(--orange);font-size:12px;
  background:rgba(247,147,26,.08);border:1px solid rgba(247,147,26,.2);padding:4px 9px;border-radius:20px}
.live{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--green);
  background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.15);padding:3px 8px;border-radius:20px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}

/* ── PAGE ── */
.page{max-width:480px;margin:0 auto;padding:10px 10px 80px}

/* ── LAST SIGNAL BANNER ── */
#banner{display:none;border-radius:10px;padding:12px 14px;margin-bottom:10px;border:1px solid}
#banner.buy {background:rgba(34,197,94,.07); border-color:rgba(34,197,94,.3)}
#banner.sell{background:rgba(239,68,68,.07); border-color:rgba(239,68,68,.3)}
#banner.move{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.25)}
.bn-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.bn-badge{font-size:10px;font-weight:800;padding:2px 9px;border-radius:20px}
.bb-buy {background:rgba(34,197,94,.18); color:#4ade80;border:1px solid rgba(34,197,94,.4)}
.bb-sell{background:rgba(239,68,68,.18); color:#f87171;border:1px solid rgba(239,68,68,.4)}
.bb-move{background:rgba(245,158,11,.14);color:#fcd34d;border:1px solid rgba(245,158,11,.35)}
.bn-time{font-size:10px;color:var(--muted)}
.bn-entity{font-size:15px;font-weight:800;margin-bottom:2px}
.bn-amount{font-family:monospace;font-size:19px;font-weight:800;margin-bottom:5px}
.bn-summary{font-size:12px;color:#8892aa;line-height:1.55;margin-bottom:7px}
.bn-link{font-size:10px;color:var(--muted);font-family:monospace;text-decoration:none}
.bn-link:hover{color:var(--orange)}

/* ── STATS ROW ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 8px;text-align:center}
.stat-l{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:4px}
.stat-v{font-size:18px;font-weight:800;font-family:monospace;letter-spacing:-.5px}
.co{color:var(--orange)}.cg{color:var(--green)}.cr{color:var(--red)}

/* ── SECTION ── */
.section{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.sec-h{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.05)}
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted)}
.sec-act{font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px;-webkit-tap-highlight-color:transparent}
.sec-act:active{color:var(--orange)}

/* ── SEARCH BOX ── */
.qbox{padding:10px 12px}
.qrow{display:flex;gap:6px;margin-bottom:6px}
.qrow input{flex:1;background:var(--bg);border:1px solid rgba(255,255,255,.1);color:var(--txt);
  padding:9px 10px;border-radius:8px;font-family:monospace;font-size:11px;outline:none;min-width:0;
  -webkit-appearance:none}
.qrow input:focus{border-color:var(--orange)}
.qrow input::placeholder{color:var(--dim)}
.qrow2{display:flex;gap:6px}
.qrow2 input{flex:1;background:var(--bg);border:1px solid rgba(255,255,255,.1);color:var(--txt);
  padding:9px 10px;border-radius:8px;font-size:11px;outline:none;min-width:0;-webkit-appearance:none}
.qrow2 input:focus{border-color:var(--orange)}
.qrow2 input::placeholder{color:var(--dim)}
.qbtn{padding:9px 14px;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.qbtn-p{background:var(--orange);color:#000}
.qbtn-p:active{background:#e08010}
.qbtn-s{background:none;border:1px solid rgba(255,255,255,.12);color:var(--txt)}
.qbtn-s:active{border-color:var(--orange);color:var(--orange)}

/* ── QUERY RESULT ── */
#qr{display:none;border-top:1px solid var(--border);padding:12px}
.qr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.qr-name{font-size:14px;font-weight:800}
.qr-type{font-size:10px;color:var(--muted);margin-top:2px}
.qr-addr{font-family:monospace;font-size:9px;color:var(--muted);margin-top:2px}
.qr-addr a{color:var(--muted);text-decoration:none}
.qr-bal{text-align:right;flex-shrink:0}
.qr-btc{font-family:monospace;font-size:20px;font-weight:800;color:var(--orange)}
.qr-usd{font-size:10px;color:var(--muted);margin-top:1px}
.qr-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.qr-stat{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 6px;text-align:center}
.qr-stat-l{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.qr-stat-v{font-family:monospace;font-size:13px;font-weight:700}
.qr-tx-title{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:8px;padding-top:10px;border-top:1px solid var(--border)}
.tx-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.tx-item:last-child{border-bottom:none}
.tx-dir{font-size:9px;font-weight:800;padding:2px 6px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.d-in {background:rgba(34,197,94,.13); color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.d-out{background:rgba(239,68,68,.13); color:#f87171;border:1px solid rgba(239,68,68,.3)}
.tx-body{flex:1;min-width:0}
.tx-sum{font-size:11px;color:#8892aa;line-height:1.5}
.tx-meta{font-size:9px;color:var(--dim);margin-top:2px}
.tx-meta a{color:var(--dim);text-decoration:none;font-family:monospace}
.tx-amt{font-family:monospace;font-size:11px;font-weight:700;text-align:right;white-space:nowrap;flex-shrink:0}
.qr-actions{display:flex;gap:6px;margin-top:10px}

/* ── SIGNAL LOG ── */
.log-item{display:flex;gap:8px;align-items:flex-start;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04)}
.log-item:last-child{border-bottom:none}
.log-badge{font-size:9px;font-weight:800;padding:2px 6px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.lb-buy {background:rgba(34,197,94,.14); color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.lb-sell{background:rgba(239,68,68,.14); color:#f87171;border:1px solid rgba(239,68,68,.3)}
.lb-move{background:rgba(245,158,11,.12);color:#fcd34d;border:1px solid rgba(245,158,11,.3)}
.log-mid{flex:1;min-width:0}
.log-name{font-size:12px;font-weight:700;margin-bottom:2px}
.log-sum{font-size:11px;color:#8892aa;line-height:1.5}
.log-meta{font-size:9px;color:var(--dim);margin-top:3px}
.log-meta a{color:var(--dim);text-decoration:none;font-family:monospace}
.log-right{text-align:right;flex-shrink:0}
.log-btc{font-family:monospace;font-size:12px;font-weight:700}
.log-usd{font-size:9px;color:var(--muted);margin-top:1px}

/* ── EMPTY ── */
.empty{text-align:center;padding:24px 16px;color:var(--dim);font-size:11px;line-height:1.7}

/* ── SPINNER ── */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.08);border-top-color:var(--orange);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── TOASTS ── */
#toasts{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:999;
  display:flex;flex-direction:column;align-items:center;gap:5px;pointer-events:none;width:90%;max-width:380px}
.toast{background:#161923;border:1px solid rgba(255,255,255,.1);border-radius:8px;
  padding:8px 14px;font-size:11px;animation:tin .2s ease;pointer-events:auto;line-height:1.5;
  text-align:center;width:100%}
.toast.buy{border-color:rgba(34,197,94,.5);color:#4ade80;font-weight:600}
.toast.sell{border-color:rgba(239,68,68,.5);color:#f87171;font-weight:600}
.toast.ok{border-color:rgba(34,197,94,.3)}
.toast.err{border-color:rgba(239,68,68,.3);color:#f87171}
@keyframes tin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>

// ─── PARSE ───────────────────────────────────────────────
function parseWallets(){
  const entities=[],addrMap={};
  WALLET_LIST.trim().split('\n').forEach(line=>{
    line=line.trim();if(!line)return;
    const p=line.split(';').map(x=>x.trim()).filter(Boolean);
    if(p.length<3)return;
    const ent={name:p[0],type:p[1],addrs:p.slice(2),bal:null,lastTxHash:null,lastCheck:null};
    entities.push(ent);
    ent.addrs.forEach(a=>{addrMap[a.toLowerCase()]=ent;});
  });
  return{entities,addrMap};
}

// ─── FİYAT ───────────────────────────────────────────────
async function fetchPrice(){
  try{
    const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
    btcPrice=(await r.json()).bitcoin.usd;

  if(btcPrice){
    document.getElementById('price-pill').textContent='$'+btcPrice.toLocaleString('en-US');

  }
}

  const label=document.getElementById('q-name').value.trim();
  if(!addr){toast('Adres boş','err');return;}
  if(!isValidBTC(addr)){toast('Geçersiz BTC adresi','err');return;}

  const res=document.getElementById('qr');
  res.style.display='block';
  res.innerHTML='<div style="padding:16px;text-align:center"><div class="spin"></div> Sorgulanıyor…</div>';

  try{
    const r1=await fetch(`https://mempool.space/api/address/${addr}`);
    if(!r1.ok)throw new Error('mempool.space yanıt vermedi');
    const info=await r1.json();
    const bal=(info.chain_stats.funded_txo_sum-info.chain_stats.spent_txo_sum)/1e8;
    const totalTx=info.chain_stats.tx_count;
    const received=info.chain_stats.funded_txo_sum/1e8;
    const sent=info.chain_stats.spent_txo_sum/1e8;

    const r2=await fetch(`https://mempool.space/api/address/${addr}/txs`);
    const txs=r2.ok?(await r2.json()).slice(0,5):[];

    const knownEnt=addrMap[addr.toLowerCase()];
    const isExchange=EXCHANGES.has(addr.toLowerCase());
    const displayName=label||knownEnt?.name||(isExchange?'Bilinen Borsa':'Bilinmeyen Adres');
    const displayType=knownEnt?.type||(isExchange?'Borsa':'—');
    const typeColor=getTypeColor(displayType);

    const txRows=txs.map(tx=>{
      let recv=0,spentAmt=0;
      (tx.vin||[]).forEach(v=>{if(v.prevout?.scriptpubkey_address===addr)spentAmt+=v.prevout.value;});
      (tx.vout||[]).forEach(v=>{if(v.scriptpubkey_address===addr)recv+=v.value;});
      const net=(recv-spentAmt)/1e8;
      const isIn=net>0;

      const counterAddrs=[];
      if(isIn){(tx.vin||[]).forEach(v=>{if(v.prevout?.scriptpubkey_address&&v.prevout.scriptpubkey_address!==addr)counterAddrs.push(v.prevout.scriptpubkey_address);});}
      else{(tx.vout||[]).forEach(v=>{if(v.scriptpubkey_address&&v.scriptpubkey_address!==addr)counterAddrs.push(v.scriptpubkey_address);});}

      const counterEx=counterAddrs.some(a=>EXCHANGES.has(a.toLowerCase()));
      const counterKnown=counterAddrs.map(a=>addrMap[a.toLowerCase()]).find(Boolean);

      let summary;
      if(isIn){
        // Para bu adrese GELDİ — kim gönderdi?
        if(counterEx)summary='Borsadan çekildi — soğuk cüzdana';
        else if(counterKnown)summary=counterKnown.name+' adresinden transfer';
        else summary='Bilinmeyen kaynaktan giriş';
      }else{
        // Para bu adresten GİTTİ — nereye?
        if(counterEx)summary='Borsaya gönderildi ⚠ satış hazırlığı';
        else if(counterKnown)summary=counterKnown.name+' adresine gönderildi';
        else summary='Bilinmeyen adrese çıkış';
      }

      const when=tx.status?.block_time?timeAgo(tx.status.block_time*1000):'Bekliyor';
      return`<div class="tx-item">
        <div class="tx-dir ${isIn?'d-in':'d-out'}">${isIn?'↓ GİRDİ':'↑ ÇIKTI'}</div>
        <div class="tx-body">
          <div class="tx-sum">${summary}</div>
          <div class="tx-meta">${when} · <a href="https://mempool.space/tx/${tx.txid}" target="_blank">${tx.txid.slice(0,10)}…↗</a></div>
        </div>
        <div class="tx-amt" style="color:${isIn?'#4ade80':'#f87171'}">${(isIn?'+':'')+net.toFixed(4)}<br><span style="font-size:8px;color:var(--orange)">BTC</span></div>
      </div>`;
    }).join('');

    const isWatched=extraWallets.find(w=>w.addr===addr)||knownEnt;

    res.innerHTML=`
      <div class="qr-top">
        <div>
          <div class="qr-name">${esc(displayName)}</div>
          <div class="qr-type" style="color:${typeColor}">${displayType}</div>
          <div class="qr-addr"><a href="https://mempool.space/address/${addr}" target="_blank">${addr.slice(0,10)}…${addr.slice(-5)} ↗</a></div>
        </div>
        <div class="qr-bal">
          <div class="qr-btc">${bal.toFixed(4)}</div>
          <div style="font-size:8px;color:var(--orange);font-weight:700">BTC</div>
          <div class="qr-usd">${btcPrice?'$'+fmtUSD(bal*btcPrice):''}</div>
        </div>
      </div>
      <div class="qr-stats">
        <div class="qr-stat"><div class="qr-stat-l">Toplam TX</div><div class="qr-stat-v co">${totalTx.toLocaleString()}</div></div>
        <div class="qr-stat"><div class="qr-stat-l">Alındı</div><div class="qr-stat-v cg">${received.toFixed(2)}</div></div>
        <div class="qr-stat"><div class="qr-stat-l">Gönderildi</div><div class="qr-stat-v cr">${sent.toFixed(2)}</div></div>
      </div>
      ${txs.length?`<div class="qr-tx-title">Son ${txs.length} İşlem</div>${txRows}`:'<div style="font-size:11px;color:var(--muted);padding:6px 0">İşlem bulunamadı</div>'}
      <div class="qr-actions">
        ${!isWatched?`<button class="qbtn qbtn-p" onclick="addToWatch('${addr}','${esc(displayName)}','${displayType}')">+ İzlemeye Ekle</button>`:`<span style="font-size:10px;color:var(--muted);align-self:center">✓ İzleniyor</span>`}
        <button class="qbtn qbtn-s" onclick="closeQR()">Kapat</button>
      </div>`;
  }catch(e){
    res.innerHTML=`<div style="padding:12px;color:#f87171;font-size:11px">Hata: ${e.message}</div>`;
  }
}

function closeQR(){
  document.getElementById('qr').style.display='none';
  document.getElementById('q-addr').value='';
  document.getElementById('q-name').value='';
}

function addToWatch(addr,name,type){
  if(extraWallets.find(w=>w.addr===addr)){toast('Zaten izleniyor','err');return;}
  extraWallets.push({addr,name,type,bal:null,lastTxHash:null,lastCheck:null});
  localStorage.setItem('btc_extra',JSON.stringify(extraWallets));
  addrMap[addr.toLowerCase()]={name,type,addrs:[addr]};
  renderExtra();
  toast(name+' izlemeye eklendi','ok');
  closeQR();
}

// ─── PERİYODİK KONTROL ───────────────────────────────────
async function runChecks(){
  // Hem kurumsal liste hem özel izlemeler
  const extras=extraWallets.map(w=>({name:w.name,type:w.type,addrs:[w.addr],
    bal:w.bal,lastTxHash:w.lastTxHash,lastCheck:w.lastCheck,_extra:w}));
  const all=[...entities,...extras];
  let i=0;
  for(const ent of all){
    i++;
    setStatus(`${i}/${all.length} kontrol`);
    for(const addr of(ent.addrs||[])){
      await checkAddr(ent,addr);
      await sleep(350);
    }
  }
  setStatus(`${all.length} cüzdan · ${timeNow()}`);
  renderExtra();
}

async function checkAddr(entity,addr){
  try{
    const r1=await fetch(`https://mempool.space/api/address/${addr}`);
    if(!r1.ok)return;
    const info=await r1.json();
    const bal=(info.chain_stats.funded_txo_sum-info.chain_stats.spent_txo_sum)/1e8;
    entity.bal=bal;
    if(entity._extra){entity._extra.bal=bal;localStorage.setItem('btc_extra',JSON.stringify(extraWallets));}

    const r2=await fetch(`https://mempool.space/api/address/${addr}/txs`);
    if(!r2.ok)return;
    const txs=await r2.json();
    if(!txs?.length){entity.lastCheck=Date.now();return;}

    const latestHash=txs[0].txid;
    entity.lastCheck=Date.now();
    if(entity.lastTxHash&&entity.lastTxHash!==latestHash){
      await analyzeTx(entity,addr,txs[0]);
    }
    entity.lastTxHash=latestHash;
    if(entity._extra){entity._extra.lastTxHash=latestHash;localStorage.setItem('btc_extra',JSON.stringify(extraWallets));}
  }catch{}
}

// ─── TX ANALİZİ (DÜZELTİLDİ) ────────────────────────────
async function analyzeTx(entity,watchAddr,tx){
  let recv=0,spentAmt=0;
  const counterAddrs=[];

  (tx.vin||[]).forEach(v=>{
    if(v.prevout?.scriptpubkey_address===watchAddr)spentAmt+=v.prevout.value;
    else if(v.prevout?.scriptpubkey_address)counterAddrs.push(v.prevout.scriptpubkey_address);
  });
  (tx.vout||[]).forEach(v=>{
    if(v.scriptpubkey_address===watchAddr)recv+=v.value;
    else if(v.scriptpubkey_address)counterAddrs.push(v.scriptpubkey_address);
  });

  const netBtc=(recv-spentAmt)/1e8;
  if(Math.abs(netBtc)<MIN_BTC)return;

  const counterEx=counterAddrs.some(a=>EXCHANGES.has(a.toLowerCase()));
  const counterEnt=counterAddrs.map(a=>addrMap[a.toLowerCase()]).find(Boolean);
  const btcAbs=Math.abs(netBtc);
  const usd=btcAbs*btcPrice;

  let signalType,badge,summary;

  if(netBtc>0){
    // Cüzdana para GELDİ — hangi kaynaktan?
    if(counterEx){
      // Borsadan çekildi → birikim sinyali (BUY)
      signalType='buy';badge='🟢 BİRİKİM';
      summary=`${entity.name}, borsadan ${btcAbs.toFixed(4)} BTC çekti. Soğuk cüzdana transfer — birikim sinyali.`;
    }else if(counterEnt){
      signalType='move';badge='🟡 TRANSFER';
      summary=`${entity.name}, ${counterEnt.name} adresinden ${btcAbs.toFixed(4)} BTC aldı. Kurumlar arası hareket.`;
    }else{
      signalType='buy';badge='🟢 GİRİŞ';
      summary=`${entity.name} cüzdanına ${btcAbs.toFixed(4)} BTC girdi. Kaynak bilinmiyor — OTC veya miner ödülü olabilir.`;
    }
  }else{
    // Cüzdandan para GİTTİ — nereye?
    if(counterEx){
      // Borsaya gönderildi → satış sinyali (SELL)
      signalType='sell';badge='🔴 SATIŞ SİNYALİ';
      summary=`${entity.name} (${entity.type}), borsaya ${btcAbs.toFixed(4)} BTC gönderdi. Satış hazırlığı — piyasada baskı yaratabilir.`;
    }else if(counterEnt){
      signalType='move';badge='🟡 TRANSFER';
      summary=`${entity.name}, ${counterEnt.name} adresine ${btcAbs.toFixed(4)} BTC gönderdi. Kurumlar arası hareket.`;
    }else{
      signalType='move';badge='🟡 ÇIKIŞ';
      summary=`${entity.name} cüzdanından ${btcAbs.toFixed(4)} BTC çıktı. Hedef bilinmiyor — OTC satış veya soğuk cüzdan transferi olabilir.`;
    }
  }

  const entry={t:Date.now(),entity:entity.name,type:entity.type,btc:netBtc,usd,badge,signalType,summary,txHash:tx.txid};
  signalLog.unshift(entry);
  if(signalLog.length>50)signalLog.pop();

  if(signalType==='sell'){sSell++;document.getElementById('s-sell').textContent=sSell;}
  else if(signalType==='buy'){sBuy++;document.getElementById('s-buy').textContent=sBuy;}

  showBanner(entry);
  renderLog();
  toast(badge+'\n'+entity.name+' — '+btcAbs.toFixed(4)+' BTC',signalType==='sell'?'sell':'buy');
}

// ─── BANNER ──────────────────────────────────────────────
function showBanner(e){
  const b=document.getElementById('banner');
  b.className=e.signalType;b.style.display='block';
  const badge=document.getElementById('bn-badge');
  badge.textContent=e.badge;badge.className='bn-badge bb-'+e.signalType;
  document.getElementById('bn-time').textContent=timeAgo(e.t);
  const ent=document.getElementById('bn-entity');
  ent.textContent=e.entity+' · '+e.type;
  ent.style.color=e.signalType==='sell'?'#f87171':e.signalType==='buy'?'#4ade80':'#fcd34d';
  const amt=document.getElementById('bn-amount');
  const sign=e.btc>0?'+':'';
  amt.textContent=sign+e.btc.toFixed(4)+' BTC'+(e.usd?' ≈ $'+fmtUSD(e.usd):'');
  amt.style.color=e.signalType==='sell'?'#f87171':e.signalType==='buy'?'#4ade80':'#fcd34d';
  document.getElementById('bn-summary').textContent=e.summary;
  const link=document.getElementById('bn-link');
  link.href='https://mempool.space/tx/'+e.txHash;
  link.textContent='TX: '+e.txHash.slice(0,16)+'… ↗';
}

// ─── LOG ─────────────────────────────────────────────────
function renderLog(){
  const el=document.getElementById('log-body');
  if(!signalLog.length){el.innerHTML='<div class="empty">İzleniyor…<br>Balina hareketi bekleniyor</div>';return;}
  el.innerHTML=signalLog.map(e=>`
    <div class="log-item">
      <div class="log-badge lb-${e.signalType}">${e.badge}</div>
      <div class="log-mid">
        <div class="log-name">${esc(e.entity)} <span style="font-size:9px;color:var(--muted);font-weight:400">${e.type}</span></div>
        <div class="log-sum">${e.summary}</div>
        <div class="log-meta">${timeAgo(e.t)} · <a href="https://mempool.space/tx/${e.txHash}" target="_blank">${e.txHash.slice(0,10)}…↗</a></div>
      </div>
      <div class="log-right">
        <div class="log-btc" style="color:${e.signalType==='sell'?'#f87171':e.signalType==='buy'?'#4ade80':'#fcd34d'}">${(e.btc>0?'+':'')+e.btc.toFixed(4)}</div>
        <div style="font-size:8px;color:var(--orange)">BTC</div>
        ${e.usd?`<div class="log-usd">$${fmtUSD(e.usd)}</div>`:''}
      </div>
    </div>`).join('');
}

function clearLog(){
  signalLog=[];sBuy=0;sSell=0;
  document.getElementById('s-buy').textContent='0';
  document.getElementById('s-sell').textContent='0';
  document.getElementById('banner').style.display='none';
  renderLog();
}

// ─── ÖZEL İZLEME LİSTESİ ─────────────────────────────────
function renderExtra(){
  const sec=document.getElementById('extra-section');
  const el=document.getElementById('extra-body');
  if(!extraWallets.length){sec.style.display='none';return;}
  sec.style.display='block';
  el.innerHTML=extraWallets.map(w=>`
    <div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer"
      onclick="fillQuery('${w.addr}','${esc(w.name)}')">
      <div style="width:6px;height:6px;border-radius:50%;flex-shrink:0;background:${w.lastCheck?'#22c55e':'#3d4460'}"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:700">${esc(w.name)}</div>
        <div style="font-family:monospace;font-size:9px;color:var(--muted)">${w.addr.slice(0,10)}…${w.addr.slice(-5)}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-family:monospace;font-size:11px;font-weight:700;color:var(--orange)">${w.bal!=null?w.bal.toFixed(4)+' BTC':'—'}</div>
        <div style="font-size:9px;color:var(--muted)">${w.bal!=null&&btcPrice?'$'+fmtUSD(w.bal*btcPrice):''}</div>
      </div>
      <button onclick="event.stopPropagation();removeExtra('${w.addr}')"
        style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:2px 4px;flex-shrink:0">✕</button>
    </div>`).join('');
}

function fillQuery(addr,name){
  document.getElementById('q-addr').value=addr;
  document.getElementById('q-name').value=name;
  window.scrollTo({top:0,behavior:'smooth'});
  queryAddr();
}

function removeExtra(addr){
  extraWallets=extraWallets.filter(w=>w.addr!==addr);
  delete addrMap[addr.toLowerCase()];
  localStorage.setItem('btc_extra',JSON.stringify(extraWallets));
  renderExtra();
}

async function refreshAll(){toast('Güncelleniyor…','ok');await runChecks();toast('Tamamlandı','ok');}

// ─── HELPERS ─────────────────────────────────────────────
function getTypeColor(t){return t==='Borsa'?'#60a5fa':t==='ETF'?'#a78bfa':t==='Miner'?'#fbbf24':t==='Hükümet'?'#f87171':'#94a3b8';}
function fmtUSD(v){if(v>=1e9)return(v/1e9).toFixed(2)+'B';if(v>=1e6)return(v/1e6).toFixed(2)+'M';if(v>=1e3)return(v/1e3).toFixed(1)+'K';return v.toFixed(0);}
function timeAgo(ts){const s=Math.floor((Date.now()-ts)/1000);if(s<60)return s+'sn önce';if(s<3600)return Math.floor(s/60)+'dk önce';return Math.floor(s/3600)+'sa önce';}
function timeNow(){return new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function setStatus(t){document.getElementById('status').textContent=t;}
function isValidBTC(a){return/^(1|3)[a-zA-HJ-NP-Z0-9]{25,34}$/.test(a)||/^bc1[a-z0-9]{39,87}$/i.test(a);}
function toast(msg,type=''){
  const t=document.createElement('div');t.className='toast '+type;
  t.innerHTML=msg.replace(/\n/g,'<br>');
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>t.remove(),type==='sell'||type==='buy'?9000:3500);
}

init();
</script>
